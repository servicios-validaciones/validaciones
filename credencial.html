<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Carnet de Conducir - Río Negro</title>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* BOTÓN */
.btn-pdf{
    position:absolute;
    top:10px;
    left:10px;
    z-index:100;
    padding:8px 12px;
    background:#005691;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* CONTENEDOR */
.carnet-container {
    width: 500px;
    height: 315px;
    background-color: #fff;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    overflow: hidden;
    position: relative;
    border: 1px solid #ccc;
}

/* HEADER */
.header {
    background-color: #005691;
    color: white;
    padding: 6px 10px; /* ajustado */
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 35px; /* ajustado */
}

.header-logos {
    display: flex;
    align-items: center;
    gap: 10px;
}

.flag-icon { width: 28px; }
.shield-icon { width: 23px; }

.header-title {
    font-size: 12px; /* ajustado */
    font-weight: bold;
    text-align: center;
    flex-grow: 1;
}

/* CONTENIDO */
.content {
    padding: 10px;
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 10px;
    height: calc(100% - 70px); /* CLAVE */
    box-sizing: border-box;
}

/* FOTO */
.photo-section {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.photo-placeholder {
    width: 100px;
    height: 120px;
    background-color: #e0e0e0;
    border: 2px dashed #999;
    border-radius: 5px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 10px;
    text-align: center;
    cursor: pointer;
    overflow: hidden;
}

.photo-placeholder img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

.photo-instructions {
    font-size: 9px;
}

/* DATOS */
.data-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    font-size: 10px;
}

.data-item {
    display: flex;
    flex-direction: column;
}

.label {
    font-weight: bold;
    margin-bottom: 2px;
}

.editable-input {
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 2px;
    font-size: 10px;
    width: 100%;
    box-sizing: border-box;
}

/* CLASES Y FIRMA */
.classes-signature {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 2px;
}

.signature-placeholder {
    height: 25px;
    background-color: #f9f9f9;
    border: 1px solid #ddd;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 10px;
}

/* FOOTER */
.footer {
    background-color: #005691;
    color: white;
    padding: 6px 10px;
    height: 35px;
    position: absolute;
    bottom: 0;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
}

.footer-logo {
    width: 20px;
}
</style>
</head>

<body>

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>

<div class="carnet-container" id="carnet">

    <div class="header">
        <div class="header-logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Flag_of_Argentina.svg" class="flag-icon">
        </div>

        <div class="header-title">
            REPÚBLICA ARGENTINA<br>
            Río Negro - General Roca
        </div>

        <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="shield-icon">
    </div>

    <div class="content">

        <div class="photo-section">
            <div class="photo-placeholder" onclick="document.getElementById('fileInput').click();">
                <span id="placeholderText">Hacé click<br>para subir foto</span>
                <img id="photoPreview">
            </div>
            <div class="photo-instructions">(110x135px)</div>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(this);">
        </div>

        <div class="data-section">

            <div class="data-item">
                <span class="label">1. Apellido / Last Name</span>
                <input type="text" class="editable-input" value="Ceballos">
            </div>

            <div class="data-item">
                <span class="label">2. Nombre / First Name</span>
                <input type="text" class="editable-input" value="Angel Ceferino">
            </div>

            <div class="data-item" style="grid-column:1/-1;">
                <span class="label">8. Domicilio / Address</span>
                <input type="text" class="editable-input" value="PUBLICA D25 5029 CHACRA MONTE - GENERAL ROCA">
            </div>

            <div class="data-item">
                <span class="label">3. Fecha de Nac.</span>
                <input type="text" class="editable-input" value="21 jul 1981">
            </div>

            <div class="data-item">
                <span class="label">4a. Otorgamiento</span>
                <input type="text" class="editable-input" value="25/03/2026">
            </div>

            <div class="data-item">
                <span class="label">4b. Vencimiento</span>
                <input type="text" class="editable-input" value="25/03/2031">
            </div>

            <div class="classes-signature">
                <div class="data-item">
                    <span class="label">9. Clases</span>
                    <input type="text" class="editable-input" value="E1 E2 D3 D1 A1.4">
                </div>

                <div class="data-item">
                    <span class="label">7. Firma</span>
                    <div class="signature-placeholder">Firma aquí</div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer">
        <div><b>SEGURIDAD VIAL</b></div>
        <div style="display:flex;align-items:center;gap:5px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="footer-logo">
            <div>Ministerio de Transporte</div>
        </div>
    </div>

</div>

<script>
function previewImage(input) {
    let preview = document.getElementById('photoPreview');
    let text = document.getElementById('placeholderText');

    let reader = new FileReader();
    reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        text.style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
}

async function generarPDF() {
    const { jsPDF } = window.jspdf;

    const canvas = await html2canvas(document.getElementById("carnet"), { scale: 3 });
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF({
        orientation: "landscape",
        unit: "mm",
        format: [85.6, 54]
    });

    pdf.addImage(imgData, "PNG", 0, 0, 85.6, 54);
    pdf.save("carnet.pdf");
}
</script>

</body>
</html>

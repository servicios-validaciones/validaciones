<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Trámites Inmobiliarios</title>

<style>
body { font-family: Arial; background: #f4f6f8; padding: 20px; }
.container {
    max-width: 900px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin: auto;
}
h2 { text-align: center; }
input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 6px 0 12px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
.section { display: none; }
button {
    width: 100%;
    padding: 12px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}
.info {
    background: #eef;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 15px;
}
</style>

<script>
function mostrarSecciones() {
    let tipo = document.getElementById("tramite").value;

    document.getElementById("compraVenta").style.display = "none";
    document.getElementById("usucapion").style.display = "none";
    document.getElementById("cesion").style.display = "none";

    if (tipo === "compraventa") document.getElementById("compraVenta").style.display = "block";
    if (tipo === "usucapion") document.getElementById("usucapion").style.display = "block";
    if (tipo === "cesion") document.getElementById("cesion").style.display = "block";
}

function enviarWhatsApp() {

let tramite = document.getElementById("tramite").value;

let mensaje = "📄 *SOLICITUD DE TRÁMITE*\n\n";

if (tramite === "usucapion") mensaje += "ACTA DE POSESIÓN (USUCAPIÓN)\n";
if (tramite === "compraventa") mensaje += "COMPRAVENTA INMOBILIARIA\n";
if (tramite === "cesion") mensaje += "CESIÓN DE DERECHOS\n";

mensaje += "\n👤 SOLICITANTE\n";
mensaje += nombre.value + " | DNI: " + dni.value + " | Tel: " + telefono.value + "\n";

mensaje += "\n📍 INMUEBLE\n";
mensaje += "Dirección: " + direccion.value + "\n";
mensaje += "Nomenclatura: " + nomenclatura.value + "\n";
mensaje += "Tipo: " + tipoInmueble.value + "\n";
mensaje += "Estado: " + condicion.value + "\n";
mensaje += "Habitado: " + habitado.value + "\n";

if (tramite === "compraventa") {
mensaje += "\n💰 OPERACIÓN\n";
mensaje += "Precio: $" + precio.value + "\n";

mensaje += "\n👨‍💼 Vendedor: " + vendedor.value + " (DNI " + dniVendedor.value + ")\n";
mensaje += "👨‍💼 Comprador: " + comprador.value + " (DNI " + dniComprador.value + ")\n";
}

if (tramite === "usucapion") {
mensaje += "\n👥 TESTIGOS\n";
mensaje += testigo1.value + " (DNI " + dniTestigo1.value + ")\n";
mensaje += testigo2.value + " (DNI " + dniTestigo2.value + ")\n";
}

if (tramite === "cesion") {
mensaje += "\n📑 CESIÓN\n";
mensaje += "Cedente: " + cedente.value + " (DNI " + dniCedente.value + ")\n";
mensaje += "Cesionario: " + cesionario.value + " (DNI " + dniCesionario.value + ")\n";
}

mensaje += "\n💰 HONORARIOS\n$1.500.000 | 50% inicio / 50% final\n";

mensaje += "\n📂 INCLUYE:\n";
mensaje += "- Escritura\n- Certificados RPI\n- Certificados catastrales\n- Inhibición\n";

let url = "https://wa.me/5491131602393?text=" + encodeURIComponent(mensaje);
window.open(url, "_blank");
}
</script>
</head>

<body>

<div class="container">
<h2>Formulario de Trámite Inmobiliario</h2>

<div class="info">
💰 Servicio completo: $1.500.000<br>
✔ 50% anticipo - 50% contra entrega<br>
📄 Entrega digital en PDF
</div>

<select id="tramite" onchange="mostrarSecciones()">
<option value="">Seleccionar tipo de trámite</option>
<option value="usucapion">Usucapión</option>
<option value="compraventa">Compraventa</option>
<option value="cesion">Cesión</option>
</select>

<h3>Datos del solicitante</h3>
<input id="nombre" placeholder="Nombre completo">
<input id="dni" placeholder="DNI">
<input id="telefono" placeholder="Teléfono">

<h3>Datos del inmueble</h3>
<input id="direccion" placeholder="Dirección">
<input id="nomenclatura" placeholder="Nomenclatura (opcional)">
<select id="tipoInmueble">
<option>Casa</option>
<option>Departamento</option>
<option>Terreno</option>
<option>Lote</option>
</select>
<textarea id="condicion" placeholder="Estado del inmueble"></textarea>
<select id="habitado">
<option>Habitado</option>
<option>No habitado</option>
</select>

<div id="compraVenta" class="section">
<h3>Compraventa</h3>
<input id="precio" placeholder="Precio">
<input id="vendedor" placeholder="Nombre del vendedor">
<input id="dniVendedor" placeholder="DNI vendedor">
<input id="comprador" placeholder="Nombre del comprador">
<input id="dniComprador" placeholder="DNI comprador">
</div>

<div id="usucapion" class="section">
<h3>Testigos</h3>
<input id="testigo1" placeholder="Nombre testigo 1">
<input id="dniTestigo1" placeholder="DNI">
<input id="testigo2" placeholder="Nombre testigo 2">
<input id="dniTestigo2" placeholder="DNI">
</div>

<div id="cesion" class="section">
<h3>Cesión</h3>
<input id="cedente" placeholder="Nombre cedente">
<input id="dniCedente" placeholder="DNI cedente">
<input id="cesionario" placeholder="Nombre cesionario">
<input id="dniCesionario" placeholder="DNI cesionario">
</div>

<button onclick="enviarWhatsApp()">Enviar por WhatsApp</button>

</div>

</body>
</html>

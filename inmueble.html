<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Inmobiliario Completo</title>

<style>
body { font-family: Arial; background:#f0f2f5; padding:20px; }
form { background:#fff; padding:25px; border-radius:10px; max-width:900px; margin:auto; }
h2 { background:#343a40; color:#fff; padding:10px; border-radius:5px; }
label { display:block; margin-top:10px; font-weight:bold; }
input, select, textarea {
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}
.hidden { display:none; }
button {
    margin-top:20px;
    padding:12px;
    width:100%;
    background:#28a745;
    color:#fff;
    border:none;
    font-size:16px;
    border-radius:5px;
}
</style>

<script>
function mostrarCampos() {
    let t = document.getElementById("tramite").value;

    let secciones = ["compra", "cesion", "usucapion"];
    secciones.forEach(id => document.getElementById(id).classList.add("hidden"));

    if (t) document.getElementById(t).classList.remove("hidden");
}

function enviarWhatsApp() {
    let f = document.getElementById("form");
    let data = new FormData(f);
    let msg = "📄 *TRÁMITE INMOBILIARIO*%0A%0A";

    data.forEach((v,k)=>{ msg += k + ": " + v + "%0A"; });

    window.open("https://wa.me/5491131602393?text=" + msg, "_blank");
}
</script>

</head>
<body>

<form id="form">

<h2>👤 DATOS DEL SOLICITANTE</h2>

<label>Apellido y Nombre</label>
<input name="Nombre Completo">

<label>DNI</label>
<input name="DNI">

<label>CUIT/CUIL</label>
<input name="CUIT">

<label>Estado Civil</label>
<select name="Estado Civil">
<option>Soltero</option><option>Casado</option><option>Divorciado</option><option>Viudo</option>
</select>

<label>Domicilio</label>
<input name="Domicilio">

<label>Teléfono</label>
<input name="Telefono">

<label>Email</label>
<input name="Email">

---

<h2>📌 TIPO DE TRÁMITE</h2>

<select id="tramite" name="Tipo Tramite" onchange="mostrarCampos()">
<option value="">Seleccionar</option>
<option value="compra">Compra - Venta</option>
<option value="cesion">Cesión de Derechos</option>
<option value="usucapion">Usucapión</option>
</select>

---

<h2>🏠 DATOS DEL INMUEBLE</h2>

<label>Dirección</label>
<input name="Direccion">

<label>Localidad</label>
<input name="Localidad">

<label>Provincia</label>
<input name="Provincia">

<label>Nomenclatura Catastral</label>
<input name="Nomenclatura">

<label>Partida Inmobiliaria</label>
<input name="Partida">

<label>Matrícula</label>
<input name="Matricula">

<label>Superficie (m²)</label>
<input name="Superficie">

<label>Linderos</label>
<textarea name="Linderos"></textarea>

<label>Destino</label>
<select name="Destino">
<option>Vivienda</option>
<option>Comercial</option>
<option>Terreno</option>
<option>Industrial</option>
</select>

---

<h2>📑 SITUACIÓN LEGAL</h2>

<label>¿Posee Escritura?</label>
<select name="Escritura"><option>Si</option><option>No</option></select>

<label>¿Hipoteca o Deuda?</label>
<select name="Deuda"><option>No</option><option>Si</option></select>

<label>¿Posee Plano?</label>
<select name="Plano"><option>Si</option><option>No</option></select>

<label>Observaciones</label>
<textarea name="Observaciones"></textarea>

---

<h2>📎 DOCUMENTACIÓN</h2>

<label>DNI Comprador (frente y dorso)</label>
<input type="file">

<label>DNI Vendedor</label>
<input type="file">

<label>Escritura / Boleto</label>
<input type="file">

<label>Impuestos / Servicios</label>
<input type="file">

---

<!-- COMPRA VENTA -->
<div id="compra" class="hidden">

<h2>💰 COMPRA - VENTA</h2>

<label>Datos del Vendedor</label>
<input name="Vendedor Nombre">

<label>DNI Vendedor</label>
<input name="Vendedor DNI">

<label>Domicilio Vendedor</label>
<input name="Vendedor Domicilio">

<label>Precio</label>
<input name="Precio">

<label>Moneda</label>
<select name="Moneda"><option>USD</option><option>ARS</option></select>

<label>Forma de Pago</label>
<input name="Forma Pago">

<label>Entrega de Posesión</label>
<input name="Entrega">

</div>

---

<!-- CESION -->
<div id="cesion" class="hidden">

<h2>📄 CESIÓN DE DERECHOS</h2>

<label>Cedente</label>
<input name="Cedente">

<label>Cesionario</label>
<input name="Cesionario">

<label>Objeto de la Cesión</label>
<textarea name="Objeto Cesion"></textarea>

<label>Precio Cesión</label>
<input name="Precio Cesion">

</div>

---

<!-- USUCAPION -->
<div id="usucapion" class="hidden">

<h2>⚖️ USUCAPIÓN</h2>

<label>Años de Posesión</label>
<input name="Años">

<label>Inicio de Posesión</label>
<input type="date" name="Inicio">

<label>¿Posesión Pública?</label>
<select name="Publica"><option>Si</option><option>No</option></select>

<label>¿Posesión Pacífica?</label>
<select name="Pacifica"><option>Si</option><option>No</option></select>

<label>¿Posesión Continua?</label>
<select name="Continua"><option>Si</option><option>No</option></select>

<label>Servicios a su nombre</label>
<input name="Servicios">

<label>Testigos (Nombre y DNI)</label>
<textarea name="Testigos"></textarea>

</div>

---

<button type="button" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>

</form>

</body>
</html>

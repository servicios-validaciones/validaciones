<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maqueta Licencia LNC</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card-back {
            width: 500px;
            height: 300px;
            background-color: #fff;
            border-radius: 15px;
            border: 1px solid #ccc;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            /* Fondo sutil simulando seguridad vial */
            background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), 
                        url('https://www.argentina.gob.ar/sites/default/files/vignette_seguridad_vial.png');
            background-size: cover;
        }

        /* Sección de categorías superiores */
        .categories-container {
            margin: 15px;
            border: 2px solid #333;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.8);
        }

        .category-row {
            display: flex;
            align-items: center;
            padding: 5px 10px;
            border-bottom: 1px solid #333;
            font-size: 11px;
            color: #333;
        }

        .category-row:last-child { border-bottom: none; }

        .icon {
            width: 40px;
            font-size: 20px;
            margin-right: 10px;
            text-align: center;
        }

        /* Información personal central */
        .info-section {
            padding: 0 20px;
            font-size: 12px;
            color: #444;
        }

        .info-row {
            margin-bottom: 5px;
            display: flex;
            gap: 15px;
        }

        /* Barra inferior azul */
        .footer-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background-color: #a3d5e0; /* Color celeste característico */
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
            border-top: 2px solid #8cbcc7;
        }

        .lnc-logo {
            font-weight: bold;
            font-size: 24px;
            color: #1a4a7c;
            margin-right: 10px;
        }

        .barcode-placeholder {
            flex-grow: 1;
            height: 40px;
            background: repeating-linear-gradient(
                90deg,
                #000,
                #000 2px,
                #fff 2px,
                #fff 4px
            );
            margin: 0 10px;
        }

        .signature-area {
            text-align: center;
            font-size: 9px;
            color: #333;
            width: 100px;
        }

        .name-label {
            font-weight: bold;
            display: block;
            border-bottom: 1px solid #333;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <div class="card-back">
        <div class="categories-container">
            <div class="category-row">
                <span class="icon">🏍️</span>
                <span><strong>A2.1.</strong> Motocicleta, ciclomotor y triciclo hasta 150cc.</span>
            </div>
            <div class="category-row">
                <span class="icon">🚗</span>
                <span><strong>B1.</strong> Automóviles, utilitarios, camioneta y casa rodante con motor hasta 3500kg de peso total.</span>
            </div>
        </div>

        <div class="info-section">
            <div class="info-row">
                <span><strong>Grupo y factor:</strong> RH+</span>
                <span><strong>Cuil:</strong> -- - -------- - -</span>
            </div>
            <div class="info-row">
                <span><strong>Observaciones:</strong> NINGUNA -</span>
            </div>
        </div>

        <div class="footer-bar">
            <div class="lnc-logo">LNC</div>
            
            <div class="barcode-placeholder"></div>

            <div class="signature-area">
                <span style="font-size: 8px;">NICOLAS NAIDICH</span>
                <span class="name-label"></span>
                <strong>Responsable</strong><br>
                responsible, in charge
            </div>
        </div>
    </div>

</body>
</html>

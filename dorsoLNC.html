<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>LNC - Reverso</title>    

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    

<style>    
body {    
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e6e6e6, #f7f7f7);  
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    margin:0;    
    -webkit-font-smoothing: antialiased;  
}    

.btn-pdf{    
    position:absolute;    
    top:10px;    
    left:10px;    
    padding:8px 12px;    
    background:#4aa3df;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
    z-index: 10;
}    

.carnet-container {  
    width:500px;  
    height:315px;  
    overflow:hidden;  
    display:flex;  
    flex-direction:column;  
    border-radius:14px;  
    border:1px solid rgba(0,0,0,0.15);  
    box-shadow:0 8px 25px rgba(0,0,0,0.18);  
    background:#fff;  
    position: relative;
    background-size: cover;
    background-position: center;
}  

.categories-box {
    margin: 10px 15px 5px 15px; 
    border: 1.5px solid #333;
    border-radius: 0px; 
    background: rgba(255, 255, 255, 0.7);
}

.category-row {
    display: flex;
    align-items: center;
    padding: 3px 10px; 
    border-bottom: 1.5px solid #333;
    font-size: 10px; 
    color: #1a1a1a;
}

.category-row:last-child { border-bottom: none; }

.category-icon {
    width: 35px; 
    display: flex;
    justify-content: center;
    margin-right: 12px;
}

.category-icon svg {
    width: 30px; /* Ajustado para mejor visibilidad de los iconos de costado */
    height: auto;
    fill: #333;
}

.category-text b { font-weight: 700; }

.observations-section {
    padding: 0 15px 5px 15px;
    display: flex;
    align-items: flex-end; 
    gap: 15px;
    flex-grow: 1;
    z-index: 1;
    margin-bottom: 2px; 
}

.escudo-argentino {
    width: 38px; 
    height: auto;
}

.obs-content {
    display: flex;
    flex-direction: column;
    justify-content: flex-end; 
    font-size: 10.5px;
    color: #1a1a1a;
    line-height: 1.3;
    padding-bottom: 2px;
}

.obs-row {
    display: flex;
    gap: 20px;
}

.obs-label {
    font-weight: 600;
    font-size: 9px;
    color: #333;
    text-transform: uppercase;
}

.lang-en {
    font-weight: normal !important; 
}

.footer-reverso {    
    background: transparent; 
    width:100%;    
    height:55px;    
    display:flex;    
    align-items:center;    
    padding:0 15px;    
    box-sizing: border-box;
    border-top: 2.5px solid #007bff; 
}    

.lnc-text {
    font-size: 28px;
    font-weight: 900;
    color: #005a8d;
    margin-right: 10px;
    -webkit-text-stroke: 0.5px #fff;
    text-shadow: 
        2px 2px 0px #fff,
        -1px -1px 0px #fff,
        1px -1px 0px #fff,
        -1px 1px 0px #fff,
        3px 3px 5px rgba(0,0,0,0.3);
}

.barcode {
    flex-grow: 1;
    height: 38px;
    background: repeating-linear-gradient(
        90deg,
        #000,
        #000 1px,
        #fff 1px,
        #fff 3px,
        #000 3px,
        #000 4px,
        #fff 4px,
        #fff 5px
    );
    margin: 0 15px;
}

.signature-box {
    text-align: center;
    font-size: 8.5px;
    color: #000;
    min-width: 90px;
}

.sig-name {
    display: block;
    font-weight: bold;
    border-bottom: 1px solid #000;
    margin-bottom: 2px;
    text-transform: uppercase;
}

.watermark {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.1; 
}

.linea {
    width: 4px;
    height: 60px;
    background-color: #008c8c;
}

.texto {
    display: flex;
    flex-direction: column;
    font-size: 32px;    
    font-weight: 900;
    color: #008c8c;
    line-height: 0.85;
    text-align: left;
}

</style>    
</head>    

<body>    

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>    
<button class="btn-pdf" style="top:45px;" onclick="bgInput.click()">Fondo</button>  
<input type="file" id="bgInput" hidden onchange="cambiarFondo(this)">  

<div class="carnet-container" id="carnet">    
    
    <div class="watermark">
        <div class="linea"></div>  
        <div class="texto">  
            <span>SEGURIDAD</span>  
            <span>VIAL</span>  
        </div>
    </div>

    <div class="categories-box" style="z-index: 1;">
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19,15c0,1.1-0.9,2-2,2s-2-0.9-2-2s0.9-2,2-2S19,13.9,19,15z M7,15c0,1.1-0.9,2-2,2s-2-0.9-2-2s0.9-2,2-2S7,13.9,7,15z M21,13.4V11h-2.1l-1.8-3.4c-0.2-0.4-0.6-0.6-1.1-0.6H13V5h-2v2H9v2h6.2l1.3,2.5l-6.1,1C9.6,12.2,8.9,12,8.1,12c-1.8,0-3.3,1.3-3.7,3H2v2h2.1c0.4,1.7,1.9,3,3.7,3s3.3-1.3,3.7-3h5.7c0.4,1.7,1.9,3,3.7,3s3.3-1.3,3.7-3H22v-3.2C22,14,21.6,13.6,21,13.4z"/>
                </svg>
            </span>
            <span class="category-text"><b>A2.1.</b> Motocicleta, ciclomotor y triciclo hasta 150cc.</span>
        </div>
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                </svg>
            </span>
            <span class="category-text"><b>B1.</b> Automóviles, utilitarios, camioneta y casa rodante con motor hasta 3500kg. de peso total.</span>
        </div>
    </div>

    <div class="observations-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="escudo-argentino" alt="Escudo Argentino">
        <div class="obs-content">
            <div class="obs-row">
                <span><span class="obs-label">Grupo y Factor:</span> <b>RH+</b></span>
                <span><span class="obs-label">CUIL:</span> <b>20-38638395-4</b></span>
            </div>
            <div class="obs-row">
                <span><span class="obs-label">Observaciones / <span class="lang-en">Observations:</span></span> <b>NINGUNA</b></span>
            </div>
        </div>
    </div>

    <div class="footer-reverso">    
        <div class="lnc-text">LNC</div>
        <div class="barcode"></div>
        <div class="signature-box">
            <span class="sig-name">NICOLAS NAIDICH</span>
            <b>Responsable</b><br>
            <span class="lang-en" style="font-size: 7px;">responsible, in charge</span>
        </div>
    </div>    

</div>    

<script>    
function cambiarFondo(input){  
    const carnet = document.getElementById('carnet');  
    const reader = new FileReader();  
    reader.onload = e=>{  
        carnet.style.backgroundImage = `url('${e.target.result}')`;  
    }  
    reader.readAsDataURL(input.files[0]);  
}  

async function generarPDF(){    
    const { jsPDF } = window.jspdf;    
    const canvas = await html2canvas(document.getElementById("carnet"), {  
        scale:4,  
        useCORS:true  
    });    
    const img = canvas.toDataURL("image/png");    
    const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:[85.6,54] });    
    pdf.addImage(img,"PNG",0,0,85.6,54);    
    pdf.save("reverso_lnc.pdf");    
}    
</script>    

</body>    
</html>

<!DOCTYPE html>  
<html lang="es">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Carnet</title>  

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>  

<style>  
body {  
    font-family: Arial, sans-serif;  
    background-color: #f0f0f0;  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    height:100vh;  
    margin:0;  
}  

.btn-pdf{  
    position:absolute;  
    top:10px;  
    left:10px;  
    padding:8px 12px;  
    background:#4aa3df;  
    color:#fff;  
    border:none;  
    border-radius:5px;  
    cursor:pointer;  
}  

.carnet-container {  
    width:500px;  
    height:315px;  
    background:#fff;  
    border-radius:15px;  
    overflow:hidden;  
    position:relative;  
}  

.header {  
    background:#ffffff;  
    color:#008c8c;  
    display:flex;  
    align-items:center;  
    justify-content:space-between;  
    padding:5px 10px;  
    height:40px;  
    border-bottom:2px solid #a6d8f5;  
}  

.header-title {  
    font-size:15px;  
    font-weight:bold;  
    text-align:center;  
    flex-grow:1;  
    line-height:1.1;  
}  

.flag-icon { width:30px; }  
.shield-icon { width:25px; }  

.content {  
    display:grid;  
    grid-template-columns:130px 1fr;  
    padding:10px;  
    gap:10px;  
}  

.photo-placeholder {  
    width:120px;  
    height:140px;  
    background:#e0e0e0;  
    border-radius:5px;  
    cursor:pointer;  
    overflow:hidden;  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    font-size:10px;  
    text-align:center;  
}  

.photo-placeholder img {  
    width:100%;  
    height:100%;  
    object-fit:cover;  
    display:none;  
}  

.data {  
    font-size:11px;  
}  

.item {  
    margin-bottom:6px;  
    padding-bottom:2px;  
    display:flex;
    justify-content:space-between;
    align-items:center;
}  

.label {  
    font-weight:bold;  
    display:block;  
    font-size:10px;  
}  

.inline-block {
    display:flex;
    gap:10px;
    align-items:center;
}

.signature-box {
    width:80px;
    height:25px;
    border:1px dashed #999;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:9px;
    cursor:pointer;
    overflow:hidden;
}

.signature-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

/* FOOTER */  
.footer {  
    background:#4aa3df;  
    color:#fff;  
    position:absolute;  
    bottom:0;  
    width:100%;  
    height:35px;  
    display:flex;  
    justify-content:space-between;  
    align-items:center;  
    padding:5px 10px;  
    font-size:10px;  
}  

.footer-logo {  
    width:20px;  
}  
</style>  
</head>  

<body>  

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>  

<div class="carnet-container" id="carnet">  

    <div class="header">  
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Flag_of_Argentina.svg" class="flag-icon">  

        <div class="header-title">  
            REPÚBLICA ARGENTINA<br>  
            Río Negro - General Roca  
        </div>  

        <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="shield-icon">  
    </div>  

    <div class="content">  

        <div class="photo-placeholder" onclick="fileInput.click()">  
            <span id="txtFoto">Subir foto</span>  
            <img id="preview">  
        </div>  
        <input type="file" id="fileInput" hidden onchange="previewImage(this)">  

        <div class="data">  

            <div class="item">
                <div>
                    <span class="label">N° Licencia</span>
                    123456
                </div>
                <div>
                    <span class="label">Clases</span>
                    A1 B1
                </div>
            </div>

            <div class="item">
                <div>
                    <span class="label">Apellido</span>
                    CEBALLOS
                </div>
            </div>

            <div class="item">
                <div>
                    <span class="label">Nombre</span>
                    ANGEL CEFERINO
                </div>
            </div>

            <div class="item">
                <div>
                    <span class="label">Domicilio</span>
                    CHACRA MONTE - GRAL ROCA
                </div>
            </div>

            <div class="item">
                <div>
                    <span class="label">Fecha Nacimiento</span>
                    21/07/1981
                </div>

                <div class="signature-box" onclick="firmaInput.click()">
                    <span id="txtFirma">Firma</span>
                    <img id="firmaPreview">
                </div>
                <input type="file" id="firmaInput" hidden onchange="previewFirma(this)">
            </div>

            <div class="item">
                <div>
                    <span class="label">Otorgamiento</span>
                    25/03/2026
                </div>

                <div>
                    <span class="label">Vencimiento</span>
                    25/03/2031
                </div>
            </div>

        </div>  

    </div>  

    <div class="footer">  
        <div>
            |<br>
            <b>SEGURIDAD</b><br>
            <b>VIAL</b>
        </div>

        <div style="display:flex;align-items:center;gap:5px;">  
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="footer-logo">  
            Ministerio de Transporte  
        </div>  
    </div>  

</div>  

<script>  
function previewImage(input){  
    const img = document.getElementById('preview');  
    const txt = document.getElementById('txtFoto');  

    const reader = new FileReader();  
    reader.onload = e=>{  
        img.src = e.target.result;  
        img.style.display="block";  
        txt.style.display="none";  
    }
    reader.readAsDataURL(input.files[0]);  
}

function previewFirma(input){
    const img = document.getElementById('firmaPreview');
    const txt = document.getElementById('txtFirma');

    const reader = new FileReader();
    reader.onload = e=>{
        img.src = e.target.result;
        img.style.display="block";
        txt.style.display="none";
    }
    reader.readAsDataURL(input.files[0]);
}

async function generarPDF(){  
    const { jsPDF } = window.jspdf;  
    const canvas = await html2canvas(document.getElementById("carnet"), {scale:3});  
    const img = canvas.toDataURL("image/png");  

    const pdf = new jsPDF({  
        orientation:"landscape",  
        unit:"mm",  
        format:[85.6,54]  
    });  

    pdf.addImage(img,"PNG",0,0,85.6,54);  
    pdf.save("carnet.pdf");  
}  
</script>  

</body>  
</html>

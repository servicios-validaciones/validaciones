<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>LNC - Reverso</title>    

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    

<style>    
body {    
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e6e6e6, #f7f7f7);  
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    margin:0;    
    -webkit-font-smoothing: antialiased;  
}    

.btn-pdf{    
    position:absolute;    
    top:10px;    
    left:10px;    
    padding:8px 12px;    
    background:#4aa3df;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
    z-index: 10;
}    

.carnet-container {  
    width:500px;  
    height:315px;  
    overflow:hidden;  
    display:flex;  
    flex-direction:column;  
    border-radius:14px;  
    border:1px solid rgba(0,0,0,0.15);  
    box-shadow:0 8px 25px rgba(0,0,0,0.18);  
    background:#fff;  
    position: relative;
    background-size: cover;
    background-position: center;
}  

.categories-box {
    margin: 10px 15px 5px 15px; 
    border: 1.5px solid #333;
    border-radius: 0px; 
    background: rgba(255, 255, 255, 0.7);
}

.category-row {
    display: flex;
    align-items: center;
    padding: 4px 10px; 
    border-bottom: 1.5px solid #333;
    font-size: 10px; 
    color: #1a1a1a;
}

.category-row:last-child { border-bottom: none; }

.category-icon {
    width: 35px; 
    height: 22px; /* Un poco más de altura para definir la silueta */
    margin-right: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.category-icon svg {
    height: 100%; /* Priorizamos que respete la altura del contenedor */
    width: auto;   /* Y que el ancho sea automático para no estirarse */
    fill: #333;
    overflow: visible; 
}

.category-text b { font-weight: 700; }

.observations-section {
    padding: 0 15px 5px 15px;
    display: flex;
    align-items: flex-end; 
    gap: 15px;
    flex-grow: 1;
    z-index: 1;
    margin-bottom: 2px; 
}

.escudo-argentino {
    width: 38px; 
    height: auto;
}

.obs-content {
    display: flex;
    flex-direction: column;
    justify-content: flex-end; 
    font-size: 10.5px;
    color: #1a1a1a;
    line-height: 1.3;
    padding-bottom: 2px;
}

.obs-row {
    display: flex;
    gap: 20px;
}

.obs-label {
    font-weight: 600;
    font-size: 9px;
    color: #333;
    text-transform: uppercase;
}

.lang-en {
    font-weight: normal !important; 
}

.footer-reverso {    
    background: transparent; 
    width:100%;    
    height:55px;    
    display:flex;    
    align-items:center;    
    padding:0 15px;    
    box-sizing: border-box;
    border-top: 2.5px solid #007bff; 
}    

.lnc-text {
    font-size: 28px;
    font-weight: 900;
    color: #005a8d;
    margin-right: 10px;
    -webkit-text-stroke: 0.5px #fff;
    text-shadow: 
        2px 2px 0px #fff,
        -1px -1px 0px #fff,
        1px -1px 0px #fff,
        -1px 1px 0px #fff,
        3px 3px 5px rgba(0,0,0,0.3);
}

.barcode {
    flex-grow: 1;
    height: 38px;
    background: repeating-linear-gradient(
        90deg,
        #000,
        #000 1px,
        #fff 1px,
        #fff 3px,
        #000 3px,
        #000 4px,
        #fff 4px,
        #fff 5px
    );
    margin: 0 15px;
}

.signature-box {
    text-align: center;
    font-size: 8.5px;
    color: #000;
    min-width: 90px;
}

.sig-name {
    display: block;
    font-weight: bold;
    border-bottom: 1px solid #000;
    margin-bottom: 2px;
    text-transform: uppercase;
}

.watermark {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.1; 
}

.linea {
    width: 4px;
    height: 60px;
    background-color: #008c8c;
}

.texto {
    display: flex;
    flex-direction: column;
    font-size: 32px;    
    font-weight: 900;
    color: #008c8c;
    line-height: 0.85;
    text-align: left;
}

</style>    
</head>    

<body>    

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>    
<button class="btn-pdf" style="top:45px;" onclick="bgInput.click()">Fondo</button>  
<input type="file" id="bgInput" hidden onchange="cambiarFondo(this)">  

<div class="carnet-container" id="carnet">    
    
    <div class="watermark">
        <div class="linea"></div>  
        <div class="texto">  
            <span>SEGURIDAD</span>  
            <span>VIAL</span>  
        </div>
    </div>

    <div class="categories-box" style="z-index: 1;">
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path d="M428.8 191.6c-13.8 0-26.6 4.6-37 12.3l-59.5-62.7c3.4-6.8 5.3-14.4 5.3-22.5 0-29-23.5-52.5-52.5-52.5s-52.5 23.5-52.5 52.5c0 8 1.9 15.6 5.2 22.4l-57.8 61.3C169 196 156 191.6 142.1 191.6c-43 0-78.1 35.1-78.1 78.1 0 4.1.3 8.1 1 12l-38.3 12.8C11.3 299.1 0 313.1 0 328.7v103.5c0 8.7 7.1 15.8 15.8 15.8H60c18 16 41.7 26 68 26s50-10 68-26h180c18 16 41.7 26 68 26s50-10 68-26h44c8.7 0 15.8-7.1 15.8-15.8V328.7c0-15.6-11.3-29.6-26.7-34.2l-39.7-13.3c.6-3.7.9-7.6.9-11.5 0-43-35.1-78.1-78.1-78.1zm-143.7-52.5c0 11.5-9.3 20.8-20.8 20.8s-20.8-9.3-20.8-20.8 9.3-20.8 20.8-20.8 20.8 9.3 20.8 20.8zM128 411.6c-19 0-34.5-15.5-34.5-34.5s15.5-34.5 34.5-34.5 34.5 15.5 34.5 34.5-15.5 34.5-34.5 34.5zm143.7-172.5h-32.3l48-50.7 48.7 51.3-64.4-.6zm112.5 172.5c-19 0-34.5-15.5-34.5-34.5s15.5-34.5 34.5-34.5 34.5 15.5 34.5 34.5-15.5 34.5-34.5 34.5z"/>
                </svg>
            </span>
            <span class="category-text"><b>A2.1.</b> Motocicleta, ciclomotor y triciclo hasta 150cc.</span>
        </div>
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 24 14" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.92 3.01C18.72 2.42 18.16 2 17.5 2h-11c-.66 0-1.21.42-1.42 1.01L3 9v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 13c-.83 0-1.5-.67-1.5-1.5S5.67 10 6.5 10s1.5.67 1.5 1.5S7.33 13 6.5 13zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 8l1.5-4.5h11L19 8H5z"/>
                </svg>
            </span>
            <span class="category-text"><b>B1.</b> Automóviles, utilitarios, camioneta y casa rodante con motor hasta 3500kg. de peso total.</span>
        </div>
    </div>

    <div class="observations-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="escudo-argentino" alt="Escudo Argentino">
        <div class="obs-content">
            <div class="obs-row">
                <span><span class="obs-label">Grupo y Factor:</span> <b>RH+</b></span>
                <span><span class="obs-label">CUIL:</span> <b>20-38638395-4</b></span>
            </div>
            <div class="obs-row">
                <span><span class="obs-label">Observaciones / <span class="lang-en">Observations:</span></span> <b>NINGUNA</b></span>
            </div>
        </div>
    </div>

    <div class="footer-reverso">    
        <div class="lnc-text">LNC</div>
        <div class="barcode"></div>
        <div class="signature-box">
            <span class="sig-name">NICOLAS NAIDICH</span>
            <b>Responsable</b><br>
            <span class="lang-en" style="font-size: 7px;">responsible, in charge</span>
        </div>
    </div>    

</div>    

<script>    
function cambiarFondo(input){  
    const carnet = document.getElementById('carnet');  
    const reader = new FileReader();  
    reader.onload = e=>{  
        carnet.style.backgroundImage = `url('${e.target.result}')`;  
    }  
    reader.readAsDataURL(input.files[0]);  
}  

async function generarPDF(){    
    const { jsPDF } = window.jspdf;    
    const canvas = await html2canvas(document.getElementById("carnet"), {  
        scale:4,  
        useCORS:true  
    });    
    const img = canvas.toDataURL("image/png");    
    const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:[85.6,54] });    
    pdf.addImage(img,"PNG",0,0,85.6,54);    
    pdf.save("reverso_lnc.pdf");    
}    
</script>    

</body>    
    </html>

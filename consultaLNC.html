<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Argentina - Licencia Nacional de Conducir</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background: #f2f2f2;
            height: 100vh; /* Forzamos altura de pantalla */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita scroll innecesario si la pantalla es grande */
        }

        /* LOADER */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 6px solid #e6e6e6; border-top: 6px solid #4338ca;
            border-radius: 50%; animation: girar 1s linear infinite;
        }
        @keyframes girar { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        /* HEADER */
        header {
            background: #4338ca;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .header-img {
            height: 25px;
            width: auto;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centra el contenido verticalmente para ahorrar espacio */
            max-width: 420px;
            margin: 0 auto;
            padding: 10px 15px;
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            font-size: 22px;
            margin: 0 0 10px 0;
        }

        .info-box {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        /* BOTÓN CONSULTAR CON COLOR DEL HEADER */
        .btn-container {
            text-align: center;
            margin-top: 15px;
        }
        button {
            background: #4338ca; /* Mismo tono que el header */
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            width: 200px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:disabled { opacity: .5; cursor: not-allowed; }

        /* --- EFECTO FLIP CARD --- */
        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 320px;
            height: 200px;
            margin-top: 10px;
            display: none;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card-back { transform: rotateY(180deg); }
        .card-img { width: 100%; height: 100%; object-fit: cover; }

        .flip-btn {
            background: #eee;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
            cursor: pointer;
            font-size: 20px;
            border: 1px solid #ccc;
        }

        #mensaje { margin: 10px 0; font-weight: 600; text-align: center; font-size: 15px;}
        .verde { color: #22c55e; font-weight: 700; }
        .rojo { color: #ef4444; font-weight: 700; }

        /* FOOTER SUBIDO */
        footer {
            text-align: center;
            padding: 10px;
            color: #777;
            font-size: 12px;
            border-top: 1px solid #dcdcdc;
            background: #f2f2f2;
            flex-shrink: 0;
        }
        .footer-img {
            display: block;
            margin: 5px auto 0;
            max-height: 35px;
            width: auto;
        }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://mi.argentina.gob.ar/img/logos/LOGO_LOADING.png" style="width:120px;margin-bottom:20px;">
    <div class="spinner"></div>
    <p style="margin-top:15px;color:#4338ca;font-weight:600;">Cargando sistema...</p>
</div>

<header>
    <img src="https://id.argentina.gob.ar/static/img/miargentina.svg" alt="mí" class="header-img">
    
</header>

<div class="container">
    <h2>Ingresa a tu Licencia Digital</h2>
    <p style="text-align:center; font-size: 13px; color:#666; margin-bottom: 15px;">Ingrese su CUIL para visualizar su Licencia Nacional de Conducir Digital.</p>

    <div class="info-box">
        <label for="dniInput">CUIL</label>
        <input type="text" id="dniInput" placeholder="" maxlength="8">
        <div class="btn-container">
            <button id="consultarBtn" disabled>Consultar</button>
        </div>
    </div>

    <div id="mensaje"></div>

    <div class="card-container" id="licenciaVisual">
        <div class="card-inner" id="cardInner">
            <div class="card-front">
                <img src="" id="imgFrente" class="card-img" alt="Frente Licencia">
            </div>
            <div class="card-back">
                <img src="" id="imgDorso" class="card-img" alt="Dorso Licencia">
            </div>
        </div>
    </div>
    
    <div id="flipBtnContainer" style="display:none; flex-direction:column; align-items:center;">
        <div class="flip-btn" onclick="flipCard()">🔄</div>
        <p style="font-size:11px; color:#777; margin-top: 3px;">Toca para ver el dorso</p>
    </div>
</div>

<footer>
    Centro de ayuda · Seguridad Vial
    <img src="https://id.argentina.gob.ar/static/img/logo_miArgentina_color.svg" alt="Logo Footer" class="footer-img">
</footer>

<script>
    /* LOADER */
    window.addEventListener("load",()=>{
        setTimeout(()=> { document.getElementById("loader").style.display="none"; }, 1000);
    });

    const dniInput = document.getElementById("dniInput");
    const consultarBtn = document.getElementById("consultarBtn");
    const mensaje = document.getElementById("mensaje");
    const licenciaVisual = document.getElementById("licenciaVisual");
    const flipBtnContainer = document.getElementById("flipBtnContainer");
    const cardInner = document.getElementById("cardInner");
    const imgFrente = document.getElementById("imgFrente");
    const imgDorso = document.getElementById("imgDorso");

    /* BASE DE DATOS INTERNA con opción de estado */
    const padron = {
        "01234567": {
            frente: "https://i.postimg.cc/hv0Zm3RS/carnet-(1).jpg",
            dorso: "https://i.postimg.cc/xT5Tj0hr/reverso-lnc-(2).png",
            activa: true // Si es true, sale ACTIVA en verde
        },
        "87654321": {
            frente: "LINK_FRENTE_OTRO",
            dorso: "LINK_DORSO_OTRO",
            activa: false // Si es false, sale NO ACTIVA en rojo
        }
    };

    dniInput.addEventListener("input", () => {
        consultarBtn.disabled = !(/^\d{7,8}$/.test(dniInput.value.trim()));
    });

    consultarBtn.addEventListener("click", () => {
        const dni = dniInput.value.trim();
        mensaje.innerHTML = "Espere un momento...";
        licenciaVisual.style.display = "none";
        flipBtnContainer.style.display = "none";
        cardInner.classList.remove('is-flipped');

        setTimeout(() => {
            if (padron[dni]) {
                const user = padron[dni];
                imgFrente.src = user.frente;
                imgDorso.src = user.dorso;

                // Lógica de estado dinámico
                if(user.activa) {
                    mensaje.innerHTML = "Estado de Licencia Digital: <span class='verde'>ACTIVA</span>";
                } else {
                    mensaje.innerHTML = "Estado de Licencia Digital: <span class='rojo'>NO ACTIVA</span>";
                }

                licenciaVisual.style.display = "block";
                flipBtnContainer.style.display = "flex";
            } else {
                mensaje.innerHTML = "<span class='rojo'>No se encontró licencia vinculada a este CUIL.</span>";
            }
        }, 1200);
    });

    function flipCard() {
        cardInner.classList.toggle('is-flipped');
    }
</script>

</body>
</html>

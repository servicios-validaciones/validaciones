<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnet Digital Modificable</title>
    <style>
        /* --- ESTILOS GENERALES (Cuerpo de la página) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Fuente limpia */
            background-color: #f0f2f5; /* Color de fondo suave para la pantalla */
            display: flex;
            justify-content: center; /* Centra el carnet horizontalmente */
            align-items: center; /* Centra el carnet verticalmente */
            min-height: 100vh;
            margin: 0;
        }

        /* --- ESTILOS DEL CARNET (El rectángulo principal) --- */
        .carnet-container {
            width: 450px; /* Ancho del carnet */
            height: 280px; /* Alto del carnet */
            background: linear-gradient(135deg, #2c3e50, #4ca1af); /* Fondo degradado profesional */
            color: white; /* Color de letra general */
            border-radius: 20px; /* *** BORDES REDONDEADOS *** */
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); /* Sombra para dar efecto 3D */
            overflow: hidden; /* Asegura que nada sobresalga de los bordes redondeados */
            position: relative; /* Necesario para posicionar elementos internos */
            border: 2px solid rgba(255,255,255,0.2); /* Borde sutil */
        }

        /* --- ENCABEZADO (Franja superior) --- */
        .carnet-header {
            background-color: rgba(0,0,0,0.2); /* Fondo más oscuro para el título */
            padding: 10px 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* --- CUERPO DEL CARNET (Área de foto y datos) --- */
        .carnet-body {
            display: flex; /* Alinea foto y datos en fila */
            padding: 20px;
            align-items: center;
            height: calc(100% - 70px); /* Ajusta altura restando encabezado y pie */
        }

        /* --- SECCIÓN DE LA FOTO --- */
        .foto-seccion {
            flex: 0 0 120px; /* Ancho fijo para la zona de la foto */
            text-align: center;
            margin-right: 20px;
        }

        .foto-placeholder {
            width: 110px; /* Ancho de la foto */
            height: 130px; /* Alto de la foto (proporción carnet) */
            background-color: #e0e0e0; /* Color gris si no hay foto */
            border: 3px solid white;
            border-radius: 10px; /* Bordes de la foto también redondeados */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #7f8c8d;
            font-size: 0.8rem;
            overflow: hidden; /* Para que la foto real se corte si es grande */
        }

        /* ESTILO PARA CUANDO PONGAS LA FOTO REAL */
        .foto-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta la foto sin deformarla */
        }

        /* --- SECCIÓN DE DATOS --- */
        .datos-seccion {
            flex: 1; /* Ocupa el resto del espacio */
        }

        .dato-grupo {
            margin-bottom: 10px; /* Espacio entre cada dato */
        }

        /* Las etiquetas (ej: "NOMBRE:") */
        .label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7); /* Color más tenue */
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 1px;
        }

        /* Los valores (ej: "JUAN PÉREZ") */
        .valor {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Estilo especial para el ID o número principal */
        .valor-id {
            font-family: 'Courier New', Courier, monospace; /* Fuente tipo máquina */
            font-size: 1.2rem;
            color: #f1c40f; /* Color amarillo/dorado */
        }

        /* --- PIE DEL CARNET (Franja inferior) --- */
        .carnet-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0,0,0,0.2);
            padding: 5px 20px;
            font-size: 0.75rem;
            text-align: right;
            box-sizing: border-box;
            color: rgba(255,255,255,0.6);
        }

    </style>
</head>
<body>

    <div class="carnet-container">

        <div class="carnet-header">
            Carnet de Identificación
        </div>

        <div class="carnet-body">
            
            <div class="foto-seccion">
                <div class="foto-placeholder">
                    ) la línea de la imagen -->
                    
                    <span>Espacio<br>para Foto</span>
                    
                    </div>
            </div>

            <div class="datos-seccion">
                
                <div class="dato-grupo">
                    <span class="label">Nombre Completo</span>
                    <div class="valor">JUAN PÉREZ GARCÍA</div>
                </div>

                <div class="dato-grupo">
                    <span class="label">Número de Identificación</span>
                    <div class="valor valor-id">ID-87.543.210-K</div>
                </div>

                <div class="dato-grupo" style="display: flex; gap: 20px;">
                    <div>
                        <span class="label">Fecha Emisión</span>
                        <div class="valor" style="font-size: 0.9rem;">15/05/2023</div>
                    </div>
                    <div>
                        <span class="label">Vencimiento</span>
                        <div class="valor" style="font-size: 0.9rem;">15/05/2028</div>
                    </div>
                </div>

            </div>
        </div>

        <div class="carnet-footer">
            Válido solo con firma y sello oficial | © 2023 Sistema Central
        </div>

    </div>
    </body>
</html>

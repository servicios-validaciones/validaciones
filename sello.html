<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Universitario Pro</title>

<style>
body {
  margin: 0;
  background: transparent;
}

/* efecto tinta */
.sello {
  filter: contrast(1.3) brightness(0.9);
}

/* textura tipo desgaste */
.grain {
  opacity: 0.15;
  mix-blend-mode: multiply;
}
</style>
</head>

<body>

<svg class="sello" width="320" height="320" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Color institucional -->
  <g stroke="#1f3a93" fill="none">

    <!-- Aro externo -->
    <circle cx="150" cy="150" r="140" stroke-width="5"/>

    <!-- Aro interno -->
    <circle cx="150" cy="150" r="120" stroke-width="2"/>

    <!-- Arcos para texto -->
    <defs>
      <path id="topArc" d="M 40 150 A 110 110 0 0 1 260 150" />
      <path id="bottomArc" d="M 40 150 A 110 110 0 0 0 260 150" />

      <!-- ruido / textura -->
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/>
        <feColorMatrix type="saturate" values="0"/>
        <feComponentTransfer>
          <feFuncA type="table" tableValues="0 0.2"/>
        </feComponentTransfer>
      </filter>
    </defs>

    <!-- Texto superior -->
    <text font-size="14" fill="#1f3a93" letter-spacing="2">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        UNIVERSIDAD EMPRESARIAL
      </textPath>
    </text>

    <!-- Texto inferior -->
    <text font-size="14" fill="#1f3a93" letter-spacing="2">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        REPÚBLICA ARGENTINA
      </textPath>
    </text>

    <!-- Centro -->
    <text x="150" y="140" text-anchor="middle" font-size="26" font-weight="bold" fill="#1f3a93">
      SIGLO 21
    </text>

    <line x1="90" y1="155" x2="210" y2="155" stroke="#1f3a93" stroke-width="1.5"/>

    <text x="150" y="178" text-anchor="middle" font-size="14" fill="#1f3a93">
      CÓRDOBA
    </text>

  </g>

  <!-- textura desgaste -->
  <rect class="grain" width="100%" height="100%" filter="url(#noise)"/>

</svg>

</body>
</html>

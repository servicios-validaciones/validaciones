<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal ABC | Mi Argentina</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Montserrat', sans-serif;
  background-color: #f2f9fc;
  display: flex;
  flex-direction: column;
}

/* LOADER INICIAL */

#loader {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.spinner {
  width:60px;
  height:60px;
  border:6px solid #dce6f1;
  border-top:6px solid #0072bb;
  border-radius:50%;
  animation: girar 1s linear infinite;
}

.loader-texto{
  margin-top:15px;
  font-weight:600;
  color:#0072bb;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* CONTENIDO */

header {
  background-color: #0072bb;
  color: white;
  text-align: center;
  font-weight: 700;
  padding: 1vh 0;
  font-size: 2.5vh;
}

header span {
  display: block;
  font-weight: 400;
  font-size: 1.5vh;
  color: #dce6f1;
}

main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.contenedor {
  width: 90%;
  max-width: 600px;
  background: white;
  padding: 3vh 2vw;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  border: 2px solid #0072bb;
  text-align: center;
}

.titulo {
  color: #0072bb;
  font-weight: 700;
  font-size: 3vh;
  margin-bottom: 2vh;
}

.subtitulo {
  font-size: 2vh;
  color: #555;
  opacity: 0;
  transition: opacity 0.5s ease-in-out;
}

.btn-miarg {
  background-color: #0072bb;
  color: white;
  border-radius: 50px;
  padding: 1.5vh 3vw;
  font-weight: 600;
  margin-top: 2vh;
  border: none;
}

.btn-miarg:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.toast {
  position: fixed;
  bottom: 2vh;
  right: 2vw;
  background-color: #0072bb;
  color: white;
  padding: 1vh 2vw;
  border-radius: 1vh;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  font-weight: 600;
  z-index: 1000;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

footer {
  text-align: center;
  color: #666;
  font-size: 1.5vh;
  padding: 1.5vh 0;
}
</style>
</head>

<body>

<!-- LOADER -->

<div id="loader">
  <div class="spinner"></div>
  <div class="loader-texto">Cargando portal...</div>
</div>

<header>
  Portal ABC | Mi Argentina
  <span>Portal Oficial del Estado Argentino</span>
</header>

<main>
  <div class="contenedor">
    <h1 class="titulo">Certificado Académico</h1>

    <div class="mb-3">
      <input type="text" id="dniInput" class="form-control text-center"
             placeholder="Ingrese su DNI" maxlength="8">
    </div>

    <button id="consultarBtn" class="btn-miarg" disabled>
      Consultar estado
    </button>

    <p id="mensaje" class="subtitulo mt-4"></p>
  </div>
</main>

<footer>
  © 2026 Mi Argentina — Presidencia de la Nación
</footer>

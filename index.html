<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Federal de Egreso</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#ffffff;
text-align:center;
}

/* ENCABEZADO */

.header{
padding:50px 20px 30px 20px;
}

.logo{
width:380px;
max-width:90%;
}

.gobierno{
margin-top:40px;
width:220px;
max-width:80%;
}

/* FRANJA VERDE */

.linea-verde{
height:6px;
background:#8cc63f;
width:100%;
}

/* SECCION PRINCIPAL */

.hero{
background:linear-gradient(135deg,#46b5d7,#2aa3c7);
padding:70px 25px 90px 25px;
color:white;
position:relative;
overflow:hidden;
}

/* figuras suaves tipo original */

.hero:before{
content:"";
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,0.07);
border-radius:50%;
bottom:-150px;
left:-120px;
}

.hero:after{
content:"";
position:absolute;
width:300px;
height:300px;
background:rgba(255,255,255,0.05);
border-radius:50%;
top:-120px;
right:-120px;
}

.texto{
font-size:22px;
line-height:1.5;
max-width:600px;
margin:auto;
position:relative;
z-index:2;
}

/* BOTON */

.boton{
margin-top:50px;
position:relative;
z-index:2;
}

.boton a{
display:inline-block;
padding:16px 70px;
border:2px solid rgba(255,255,255,0.8);
border-radius:6px;
color:white;
text-decoration:none;
font-size:18px;
letter-spacing:1px;
transition:0.3s;
}

.boton a:hover{
background:white;
color:#2aa3c7;
}

</style>
</head>

<body>

<div class="header">

<img src="https://refe.educacion.gob.ar/img/ReFE/Inicio/Logo-Refe.svg" class="logo">

<br>

<img src="https://refe.educacion.gob.ar/img/ReFE/Inicio/Logo-ME.svg" class="gobierno">

</div>

<div class="linea-verde"></div>

<div class="hero">

<div class="texto">
Por Resolución CFE N° 440/23, los títulos son emitidos en formato digital. Para títulos emitidos digitalmente, el ReFE es el nuevo instrumento de legalización
</div>

<div class="boton">
<a href="https://servicios-validaciones.github.io/validaciones/ReFE.html">
INGRESAR
</a>
</div>

</div>

</body>
</html>

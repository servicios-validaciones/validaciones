<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editor de Sellos Universitarios v1.32.0</title>

<style>
body {
  margin: 0;
  background: #f4f4f4;
  font-family: Arial, sans-serif;
}

.header{
  background:#111;
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:bold;
}

.panel{
  background:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.panel label{
  font-size:12px;
  display:flex;
  flex-direction:column;
}

.container{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.sello{
  filter: contrast(1.15) brightness(0.92);
}
</style>
</head>

<body>

<div class="header">
Editor de Sellos Universitarios v1.32.0
</div>

<div class="panel">

<label>Texto aro superior
<input id="topOuterInput" value="Ministerio de Educación">
</label>

<label>Texto aro inferior
<input id="bottomOuterInput" value="REPÚBLICA ARGENTINA">
</label>

<label>Texto interior
<input id="innerInput" value="INSTITUTO SUPERIOR">
</label>

<label>Texto adicional
<input id="extraInput" value="RESOLUCIÓN 123/24">
</label>

<label>Subir escudo
<input type="file" id="fileInput">
</label>

<label>Tamaño
<input type="range" id="sizeInput" min="40" max="200" value="90">
</label>

<label>Rotación
<input type="range" id="rotateInput" min="-180" max="180" value="0">
</label>

<label>Color
<input type="color" id="colorInput" value="#333333">
</label>

<button onclick="centrarEscudo()">Centrar</button>
<button onclick="descargarPNG()">Descargar PNG</button>

</div>

<div class="container">

<svg id="svg" width="420" height="320" viewBox="0 0 420 300">

<defs>
<path id="outerTop" d="M 40 150 A 170 100 0 0 1 380 150"/>
<path id="outerBottom" d="M 40 150 A 170 100 0 0 0 380 150"/>
<path id="innerBottom" d="M 70 150 A 140 75 0 0 0 350 150"/>

<clipPath id="clipEscudo">
<ellipse cx="210" cy="150" rx="45" ry="65"/>
</clipPath>
</defs>

<g id="grupo" stroke="#333" fill="none">

<ellipse cx="210" cy="150" rx="190" ry="120" stroke-width="3"/>
<ellipse cx="210" cy="150" rx="175" ry="110" stroke-width="1.5"/>
<ellipse cx="210" cy="150" rx="150" ry="90" stroke-width="2"/>

<text font-size="12">
<textPath id="topOuter" href="#outerTop" startOffset="50%" text-anchor="middle">
Ministerio de Educación
</textPath>
</text>

<text font-size="13">
<textPath id="bottomOuter" href="#outerBottom" startOffset="50%" text-anchor="middle">
REPÚBLICA ARGENTINA
</textPath>
</text>

<text font-size="12">
<textPath id="innerText" href="#innerBottom" startOffset="50%" text-anchor="middle">
INSTITUTO SUPERIOR
</textPath>
</text>

<text id="extraText" x="210" y="150" text-anchor="middle">
RESOLUCIÓN 123/24
</text>

</g>

<g clip-path="url(#clipEscudo)">
<image id="escudoImg" x="165" y="85" width="90" height="130"/>
</g>

</svg>

</div>

<script>

const escudo = document.getElementById("escudoImg");
const sizeInput = document.getElementById("sizeInput");
const rotateInput = document.getElementById("rotateInput");
const fileInput = document.getElementById("fileInput");

let x=165,y=85,scale=1,rot=0,drag=false;

// subir imagen
fileInput.onchange = e=>{
  const r = new FileReader();
  r.onload = ev=>escudo.setAttribute("href",ev.target.result);
  r.readAsDataURL(e.target.files[0]);
};

// mover
escudo.onmousedown=()=>drag=true;
document.onmouseup=()=>drag=false;
document.onmousemove=e=>{
  if(!drag)return;
  x=e.clientX-200;
  y=e.clientY-150;
  escudo.setAttribute("x",x);
  escudo.setAttribute("y",y);
};

// tamaño
sizeInput.oninput=()=>{
  let v=sizeInput.value;
  escudo.setAttribute("width",v);
  escudo.setAttribute("height",v*1.4);
};

// rotar
rotateInput.oninput=()=>{
  rot=rotateInput.value;
  escudo.setAttribute("transform",`rotate(${rot} 210 150) scale(${scale})`);
};

// centrar
function centrarEscudo(){
  x=165;y=85;rot=0;scale=1;
  escudo.setAttribute("x",x);
  escudo.setAttribute("y",y);
  escudo.setAttribute("transform","");
}

// PNG
function descargarPNG(){
  const svg = document.getElementById("svg");
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  img.src = "data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(data)));

  img.onload = ()=>{
    const canvas = document.createElement("canvas");
    canvas.width=1000;
    canvas.height=700;
    canvas.getContext("2d").drawImage(img,0,0,1000,700);

    const a=document.createElement("a");
    a.download="sello.png";
    a.href=canvas.toDataURL();
    a.click();
  };
}

</script>

</body>
</html>

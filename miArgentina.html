<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Consulta</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
background:#f2f2f2;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:60px;
height:60px;
border:6px solid #e6e6e6;
border-top:6px solid #4338ca;
border-radius:50%;
animation:girar 1s linear infinite;
}

@keyframes girar{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* HEADER */

header{
background:#4338ca;
color:white;
text-align:center;
padding:18px;
font-size:22px;
font-weight:700;
}

/* CONTENEDOR */

.container{
padding:25px;
max-width:500px;
margin:auto;
width:100%;
}

h2{
margin-bottom:20px;
}

/* INPUT */

label{
display:block;
margin-top:15px;
color:#555;
font-weight:600;
}

input{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
margin-top:5px;
font-size:16px;
}

/* BOTONES */

button{
margin-top:20px;
background:#4338ca;
color:white;
border:none;
padding:14px;
border-radius:30px;
width:180px;
font-size:16px;
cursor:pointer;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

/* BARRA PROGRESO */

.progress{
width:100%;
background:#e5e5e5;
border-radius:20px;
height:8px;
margin-top:20px;
overflow:hidden;
display:none;
}

.progress-bar{
height:100%;
width:0%;
background:#4338ca;
transition:width .4s;
}

/* MENSAJE */

#mensaje{
margin-top:20px;
font-size:16px;
color:#444;
}

/* TOAST */

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#4338ca;
color:white;
padding:12px 18px;
border-radius:8px;
opacity:0;
transition:.4s;
}

.toast.show{
opacity:1;
}

/* FOOTER */

footer{
text-align:center;
margin-top:auto;
padding:20px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<!-- LOADER -->

<div id="loader">
<div class="spinner"></div>
<p style="margin-top:15px;color:#4338ca;font-weight:600;">Cargando sistema...</p>
</div>

<header>
Sistema de Consulta
</header>

<div class="container">

<h2>Consultar certificado</h2>

<label>DNI</label>
<input type="text" id="dniInput" placeholder="Ingrese su DNI" maxlength="8">

<button id="consultarBtn" disabled>Consultar</button>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

<div id="mensaje"></div>

</div>

<footer>
Centro de ayuda · Términos y condiciones
</footer>

<div id="toast" class="toast">
Certificado disponible
</div>

<script>

/* LOADER */

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1500);
});

/* SISTEMA */

const dniInput=document.getElementById("dniInput");
const consultarBtn=document.getElementById("consultarBtn");
const mensaje=document.getElementById("mensaje");
const barra=document.getElementById("barra");
const progress=document.querySelector(".progress");
const toast=document.getElementById("toast");

const certificados={
"33131107":"2026-02-05",
"45511439":"2026-02-05",
"38500951":"2026-02-05",
"27239643":"2026-02-05",
"33825465":"2026-02-04",
"21136573":"2026-02-04",
"39629903":"2026-02-07",
"29899080":"2026-02-08",
"27726148":"2026-02-08",
"40792260":"2026-02-08"
};

dniInput.addEventListener("input",()=>{
const valido=/^\d{7,8}$/.test(dniInput.value.trim());
consultarBtn.disabled=!valido;
});

consultarBtn.addEventListener("click",()=>{

const dni=dniInput.value.trim();

mensaje.innerHTML="Consultando base de datos...";
progress.style.display="block";
barra.style.width="20%";

setTimeout(()=>{
mensaje.innerHTML="Validando certificado...";
barra.style.width="60%";
},1200);

setTimeout(()=>{

barra.style.width="100%";

if(!certificados[dni]){
mensaje.innerHTML="No se encontró información para el DNI ingresado.";
return;
}

const hoy=new Date();
hoy.setHours(0,0,0,0);

const fechaDisponible=new Date(certificados[dni]);
fechaDisponible.setHours(0,0,0,0);

if(hoy>=fechaDisponible){

mensaje.innerHTML="Verificación completada. Su certificado está DISPONIBLE.";

toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),4000);

}else{

const fechaFormateada=fechaDisponible.toLocaleDateString("es-AR");

mensaje.innerHTML="Certificado en proceso. Disponible desde "+fechaFormateada;

}

},2500);

});

</script>

</body>
</html>

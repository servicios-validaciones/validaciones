<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>LNC - Reverso Corregido</title>    

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    

<style>    
body {    
    font-family: Arial, sans-serif;
    background: #f0f0f0;  
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    margin:0;    
}    

.btn-pdf{    
    position:absolute;    
    top:10px;    
    left:10px;    
    padding:8px 12px;    
    background:#4aa3df;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
    z-index: 10;
}    

.carnet-container {  
    width:500px;  
    height:315px;  
    overflow:hidden;  
    display:flex;  
    flex-direction:column;  
    border-radius:14px;  
    border:1px solid rgba(0,0,0,0.15);  
    box-shadow:0 8px 25px rgba(0,0,0,0.18);  
    background:#fff;  
    position: relative;
    background-size: cover;
}  

.categories-box {
    margin: 10px 15px 5px 15px; 
    border: 1.5px solid #333;
    background: rgba(255, 255, 255, 0.8);
    z-index: 2;
}

.category-row {
    display: flex;
    align-items: center;
    padding: 5px 10px; 
    border-bottom: 1.5px solid #333;
    font-size: 10px; 
}

.category-row:last-child { border-bottom: none; }

.category-icon {
    width: 45px; 
    height: 25px;
    margin-right: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.category-icon svg {
    width: 100%;
    height: 100%;
    /* Quitamos el fill general para que el stroke del dibujo mande */
    fill: none;
    object-fit: contain; 
}

.category-text { font-size: 10px; line-height: 1.1; color: #000; }

.observations-section {
    padding: 0 15px 5px 15px;
    display: flex;
    align-items: flex-end; 
    gap: 15px;
    flex-grow: 1;
    margin-bottom: 5px;
}

.escudo-argentino { width: 35px; height: auto; }

.obs-content {
    display: flex;
    flex-direction: column;
    font-size: 10px;
}

.footer-reverso {    
    width:100%;    
    height:55px;    
    display:flex;    
    align-items:center;    
    padding:0 15px;    
    box-sizing: border-box;
    border-top: 2.5px solid #007bff; 
}    

.lnc-text { font-size: 28px; font-weight: 900; color: #005a8d; margin-right: 10px; }

.barcode {
    flex-grow: 1;
    height: 35px;
    background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px);
    margin: 0 15px;
}

.signature-box { text-align: center; font-size: 8px; min-width: 90px; }

.watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.1; 
    font-size: 40px;
    font-weight: 900;
    color: #008c8c;
    pointer-events: none;
}
</style>    
</head>    

<body>    

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>    

<div class="carnet-container" id="carnet">    
    
    <div class="watermark">SEGURIDAD VIAL</div>

    <div class="categories-box">
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 40 22" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="8" cy="16" r="5" stroke="black" stroke-width="2"/>
                    <circle cx="32" cy="16" r="5" stroke="black" stroke-width="2"/>
                    <path d="M8 16 L15 8 L28 8 L32 16" stroke="black" stroke-width="2"/>
                    <line x1="15" y1="8" x2="12" y2="4" stroke="black" stroke-width="2"/>
                    <line x1="28" y1="8" x2="25" y2="12" stroke="black" stroke-width="2"/>
                </svg>
            </span>
            <span class="category-text"><b>A2.1.</b> Motocicleta, ciclomotor y triciclo hasta 150cc.</span>
        </div>

        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 40 22" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 14 L35 14 L33 8 L10 8 Z" fill="black"/>
                    <rect x="2" y="12" width="36" height="4" rx="1" fill="black"/>
                    <circle cx="10" cy="17" r="3" fill="black" stroke="none"/>
                    <circle cx="30" cy="17" r="3" fill="black" stroke="none"/>
                </svg>
            </span>
            <span class="category-text"><b>B1.</b> Automóviles, utilitarios, camioneta y casa rodante hasta 3500kg.</span>
        </div>
    </div>

    <div class="observations-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="escudo-argentino">
        <div class="obs-content">
            <div><b>Grupo y Factor: RH+</b></div>
            <div><b>CUIL: 20-38638395-4</b></div>
            <div><b>Observaciones: NINGUNA</b></div>
        </div>
    </div>

    <div class="footer-reverso">    
        <div class="lnc-text">LNC</div>
        <div class="barcode"></div>
        <div class="signature-box">
            <div style="border-bottom: 1px solid #000;">NICOLAS NAIDICH</div>
            <b>Responsable</b>
        </div>
    </div>    

</div>    

<script>    
async function generarPDF(){    
    const { jsPDF } = window.jspdf;    
    // Usamos scale: 4 para que html2canvas capture los trazos finos del SVG con nitidez
    const canvas = await html2canvas(document.getElementById("carnet"), { 
        scale: 4,
        useCORS: true 
    });    
    const img = canvas.toDataURL("image/png");    
    const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:[85.6, 54] });    
    pdf.addImage(img, "PNG", 0, 0, 85.6, 54);    
    pdf.save("reverso_lnc.pdf");    
}    
</script>    

</body>    
</html>

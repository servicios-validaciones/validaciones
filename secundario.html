<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Escuela Secundaria Vertical</title>

<style>
body {
  margin: 0;
  background: transparent;
}

.sello {
  filter: contrast(1.1) brightness(0.95);
}
</style>
</head>

<body>

<svg class="sello" width="260" height="360" viewBox="0 0 260 360" xmlns="http://www.w3.org/2000/svg">

  <!-- Grupo principal -->
  <g stroke="#1a1a1a" fill="none">

    <!-- Óvalo externo (vertical) -->
    <ellipse cx="130" cy="180" rx="110" ry="160" stroke-width="4"/>

    <!-- Óvalo interno -->
    <ellipse cx="130" cy="180" rx="95" ry="140" stroke-width="1.5"/>

    <!-- Curvas -->
    <defs>
      <path id="topArc" d="M 40 180 A 90 140 0 0 1 220 180" />
      <path id="bottomArc" d="M 40 180 A 90 140 0 0 0 220 180" />
    </defs>

    <!-- Texto superior -->
    <text font-size="13" letter-spacing="2" font-family="Arial, sans-serif">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        ESCUELA DE EDUCACIÓN SECUNDARIA N° 12
      </textPath>
    </text>

    <!-- Texto inferior -->
    <text font-size="12" letter-spacing="1.5" font-family="Arial, sans-serif">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        CUE: 06-12345678-0 · BS. AS. ARGENTINA
      </textPath>
    </text>

    <!-- Centro -->
    <text x="130" y="155" text-anchor="middle"
          font-size="15"
          font-weight="bold"
          font-family="Arial, sans-serif">
      “JOSÉ HERNÁNDEZ”
    </text>

    <!-- Línea -->
    <line x1="60" y1="180" x2="200" y2="180"
          stroke="#000"
          stroke-width="1"/>

    <!-- Texto inferior centro -->
    <text x="130" y="210" text-anchor="middle"
          font-size="12"
          font-family="Arial, sans-serif">
      DIRECCIÓN GENERAL DE CULTURA Y EDUCACIÓN
    </text>

  </g>

</svg>

</body>
</html>

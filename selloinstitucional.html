<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editor de Sellos Universitarios v1.32.0</title>

<style>
body {
  margin: 0;
  background: #f4f4f4;
  font-family: Arial, sans-serif;
}

.header{
  background:#111;
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:bold;
}

.panel{
  background:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.panel label{
  font-size:12px;
  display:flex;
  flex-direction:column;
}

.container{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.sello{
  filter: contrast(1.15) brightness(0.92);
}
</style>
</head>

<body>

<div class="header">
Editor de Sellos Universitarios v1.32.0
</div>

<div class="panel">

<label>Texto aro superior
<input id="topOuterInput" value="Ministerio de Educación, Cultura, Ciencia y Tecnología">
</label>

<label>Texto aro inferior
<input id="bottomOuterInput" value="PROVINCIA DEL CHACO">
</label>

<label>Texto interior
<input id="innerInput" value="INSTITUTO SUPERIOR DE NIVEL TERCIARIO MACHAGAI">
</label>

<label>Texto adicional
<input id="extraInput" value="RESOLUCIÓN 123/24">
</label>

<label>Subir escudo
<input type="file" id="fileInput" accept="image/*">
</label>

<label>Color
<input type="color" id="colorInput" value="#333333">
</label>

<button onclick="descargarPNG()">Descargar PNG</button>

</div>

<div class="container">

<svg id="svg" class="sello" width="420" height="320" viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg">

<defs>
  <path id="outerTop" d="M 40 150 A 170 100 0 0 1 380 150"/>
  <path id="outerBottom" d="M 40 150 A 170 100 0 0 0 380 150"/>
  <path id="innerBottom" d="M 70 150 A 140 75 0 0 0 350 150"/>

  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.18"/>
    </feComponentTransfer>
  </filter>
</defs>

<g id="grupo" stroke="#333" fill="none">

<ellipse cx="210" cy="150" rx="190" ry="120" stroke-width="3"/>
<ellipse cx="210" cy="150" rx="175" ry="110" stroke-width="1.5"/>
<ellipse cx="210" cy="150" rx="150" ry="90" stroke-width="2"/>

<text font-size="12" letter-spacing="1.5" font-family="Georgia, serif">
  <textPath id="topOuter" href="#outerTop" startOffset="50%" text-anchor="middle">
    Ministerio de Educación, Cultura, Ciencia y Tecnología
  </textPath>
</text>

<text font-size="13" letter-spacing="2" font-family="Georgia, serif">
  <textPath id="bottomOuter" href="#outerBottom" startOffset="50%" text-anchor="middle">
    PROVINCIA DEL CHACO
  </textPath>
</text>

<text font-size="12.5" letter-spacing="2" font-family="Georgia, serif">
  <textPath id="innerText" href="#innerBottom" startOffset="50%" text-anchor="middle">
    INSTITUTO SUPERIOR DE NIVEL TERCIARIO MACHAGAI
  </textPath>
</text>

<text id="extraText" x="210" y="150" text-anchor="middle"
      font-size="12"
      font-family="Georgia, serif">
  RESOLUCIÓN 123/24
</text>

</g>

<!-- ESCUDO -->
<image id="escudoImg"
  x="165" y="85"
  width="90"
  height="130"
/>

<rect width="100%" height="100%" filter="url(#grain)" opacity="0.25"/>

</svg>

</div>

<script>

// inputs
const topOuterInput = document.getElementById("topOuterInput");
const bottomOuterInput = document.getElementById("bottomOuterInput");
const innerInput = document.getElementById("innerInput");
const extraInput = document.getElementById("extraInput");
const colorInput = document.getElementById("colorInput");
const fileInput = document.getElementById("fileInput");

// elementos
const topOuter = document.getElementById("topOuter");
const bottomOuter = document.getElementById("bottomOuter");
const innerText = document.getElementById("innerText");
const extraText = document.getElementById("extraText");
const grupo = document.getElementById("grupo");
const escudoImg = document.getElementById("escudoImg");

// textos
topOuterInput.oninput = () => topOuter.textContent = topOuterInput.value;
bottomOuterInput.oninput = () => bottomOuter.textContent = bottomOuterInput.value;
innerInput.oninput = () => innerText.textContent = innerInput.value;
extraInput.oninput = () => extraText.textContent = extraInput.value;

// color
colorInput.oninput = () => {
  grupo.setAttribute("stroke", colorInput.value);
};

// subir imagen (SIN CORS)
fileInput.onchange = function(){
  const file = fileInput.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    escudoImg.setAttribute("href", e.target.result);
  };
  reader.readAsDataURL(file);
};

// DESCARGA PNG (FIX REAL)
function descargarPNG(){
  const svg = document.getElementById("svg");
  const clone = svg.cloneNode(true);

  // fondo blanco
  const bg = document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("width","100%");
  bg.setAttribute("height","100%");
  bg.setAttribute("fill","#ffffff");
  clone.insertBefore(bg, clone.firstChild);

  const serializer = new XMLSerializer();
  const svgData = serializer.serializeToString(clone);
  const svgBlob = new Blob([svgData], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();

  img.onload = function(){
    const canvas = document.createElement("canvas");
    canvas.width = 1000;
    canvas.height = 700;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);

    const link = document.createElement("a");
    link.download = "sello.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };

  img.src = url;
}

</script>

</body>
</html>

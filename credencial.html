<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Estilos Base */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        /* Contenedor Principal (La "Tarjeta") */
        .card-container {
            width: 800px;
            height: 500px;
            position: relative;
            background-image: url('TU_IMAGEN_DE_FONDO.jpg'); /* Cambia esto por tu URL */
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            color: white; /* Color de texto por defecto */
        }

        /* Capa para organizar los datos */
        .overlay-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Divide en dos columnas */
            grid-template-rows: auto 1fr auto;
            padding: 40px;
            box-sizing: border-box;
        }

        /* Ejemplo de posicionamiento específico */
        .header-data {
            grid-column: 1 / span 2;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .main-info {
            align-self: center;
        }

        .secondary-info {
            align-self: center;
            text-align: right;
        }

        .footer-data {
            grid-column: 1 / span 2;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 10px;
            font-size: 0.9rem;
        }

        /* Clase para etiquetas de datos */
        .label {
            display: block;
            text-transform: uppercase;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .value {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="overlay-content">
            
            <div class="header-data">
                N° DE REGISTRO: 001-2024
            </div>

            <div class="main-info">
                <div>
                    <span class="label">Nombre Completo</span>
                    <div class="value">Juan Pérez García</div>
                </div>
                <div>
                    <span class="label">Identificación</span>
                    <div class="value">ID-987654321</div>
                </div>
            </div>

            <div class="secondary-info">
                <div>
                    <span class="label">Fecha de Emisión</span>
                    <div class="value">05/04/2024</div>
                </div>
                <div>
                    <span class="label">Vencimiento</span>
                    <div class="value">05/04/2026</div>
                </div>
            </div>

            <div class="footer-data">
                Validado por el sistema de gestión de datos - 2026
            </div>

        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Oficial</title>

<style>
body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.sello {
  width: 320px;
  height: 320px;
  border: 4px solid #ccc;
  border-radius: 50%;
  position: relative;
  box-shadow: 0 0 10px rgba(255,255,255,0.3);
}

.sello::before {
  content: "";
  position: absolute;
  top: 15px;
  left: 15px;
  width: 290px;
  height: 290px;
  border: 2px solid #aaa;
  border-radius: 50%;
}

.texto {
  position: absolute;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  color: #ddd;
  text-align: center;
}

.texto span {
  position: absolute;
  left: 50%;
  transform-origin: 0 160px;
  font-size: 14px;
  font-weight: bold;
}

.superior span {
  top: 0;
}

.inferior span {
  bottom: 0;
  transform-origin: 0 -160px;
}

.escudo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.escudo img {
  width: 90px;
  height: 90px;
  object-fit: contain;
  filter: grayscale(100%) brightness(200%);
}
</style>

</head>
<body>

<div class="sello">

  <!-- TEXTO SUPERIOR -->
  <div class="texto superior" id="textoSuperior"></div>

  <!-- TEXTO INFERIOR -->
  <div class="texto inferior" id="textoInferior"></div>

  <!-- ESCUDO -->
  <div class="escudo">
    <img id="logo" src="https://via.placeholder.com/100" alt="Escudo">
  </div>

</div>

<script>
function crearTextoCircular(id, texto, radio, invertido=false) {
  const contenedor = document.getElementById(id);
  contenedor.innerHTML = "";
  const letras = texto.split("");

  letras.forEach((letra, i) => {
    const span = document.createElement("span");
    span.innerText = letra;

    let angulo = (i * (360 / letras.length));
    if (invertido) angulo = -angulo;

    span.style.transform = `rotate(${angulo}deg) translate(${radio}px) rotate(${invertido ? 180 : 0}deg)`;

    contenedor.appendChild(span);
  });
}

// 🔧 EDITÁ ACÁ LOS TEXTOS
crearTextoCircular("textoSuperior", "DIRECCION GENERAL DE CULTURA Y EDUCACION", 140);
crearTextoCircular("textoInferior", "PROVINCIA DE BUENOS AIRES ★", 140, true);

// 🔧 CAMBIÁ EL ESCUDO ACÁ
document.getElementById("logo").src = "https://via.placeholder.com/100";
</script>

</body>
</html>

<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>LNC - Reverso Corregido</title>    

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    

<style>    
body {    
    font-family: Arial, sans-serif;
    background: #f0f0f0;  
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    margin:0;    
}    

.btn-pdf{    
    position:absolute;    
    top:10px;    
    left:10px;    
    padding:8px 12px;    
    background:#4aa3df;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
    z-index: 10;
}    

.carnet-container {  
    width:500px;  
    height:315px;  
    overflow:hidden;  
    display:flex;  
    flex-direction:column;  
    border-radius:14px;  
    border:1px solid rgba(0,0,0,0.15);  
    box-shadow:0 8px 25px rgba(0,0,0,0.18);  
    background:#fff;  
    position: relative;
    background-size: cover;
}  

.categories-box {
    margin: 10px 15px 5px 15px; 
    border: 1.5px solid #333;
    background: rgba(255, 255, 255, 0.8);
    z-index: 2;
}

.category-row {
    display: flex;
    align-items: center;
    padding: 5px 10px; 
    border-bottom: 1.5px solid #333;
    font-size: 10px; 
}

.category-row:last-child { border-bottom: none; }

.category-icon {
    width: 45px; 
    height: 25px;
    margin-right: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.category-icon svg {
    width: 100%;
    height: 100%;
    fill: #000;
    /* Esto es lo que evita que se deforme */
    object-fit: contain; 
}

.category-text { font-size: 10px; line-height: 1.1; }

.observations-section {
    padding: 0 15px 5px 15px;
    display: flex;
    align-items: flex-end; 
    gap: 15px;
    flex-grow: 1;
    margin-bottom: 5px;
}

.escudo-argentino { width: 35px; height: auto; }

.obs-content {
    display: flex;
    flex-direction: column;
    font-size: 10px;
}

.footer-reverso {    
    width:100%;    
    height:55px;    
    display:flex;    
    align-items:center;    
    padding:0 15px;    
    box-sizing: border-box;
    border-top: 2.5px solid #007bff; 
}    

.lnc-text { font-size: 28px; font-weight: 900; color: #005a8d; margin-right: 10px; }

.barcode {
    flex-grow: 1;
    height: 35px;
    background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px);
    margin: 0 15px;
}

.signature-box { text-align: center; font-size: 8px; min-width: 90px; }

.watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.1; 
    font-size: 40px;
    font-weight: 900;
    color: #008c8c;
    pointer-events: none;
}
</style>    
</head>    

<body>    

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>    

<div class="carnet-container" id="carnet">    
    
    <div class="watermark">SEGURIDAD VIAL</div>

    <div class="categories-box">
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path d="M451.7 131.5c-11.4-11.4-26.6-17.7-42.7-17.7-12.7 0-24.8 4-35.1 11.4L322.2 78.4c4.3-8.1 6.5-17.1 6.5-26.5 0-32-26-58.1-58.1-58.1s-58.1 26-58.1 58.1c0 9.1 2.1 17.8 6.1 25.6l-52.9 57.3c-7.3-3.1-15.3-4.9-23.7-4.9-33.8 0-61.2 27.4-61.2 61.2 0 4.1.4 8.1 1.2 11.9l-55.8 19.3C11.3 307.2 0 322.7 0 340.2v94.8c0 8.7 7.1 15.8 15.8 15.8H70c18 16 41.7 26 68 26s50-10 68-26h168c18 16 41.7 26 68 26s50-10 68-26h44c8.7 0 15.8-7.1 15.8-15.8V340.2c0-17.5-11.3-33-27.4-37.5l-57.9-19.4c.8-3.8 1.2-7.8 1.2-11.9 0-33.8-27.4-61.2-61.2-61.2-11.2 0-21.7 3-30.8 8.3L325.2 143c6.9 3.9 14.8 6.2 23.2 6.2 16.1 0 31.3-6.3 42.7-17.7l60.6 60.6c1.1 1.1 2.6 1.7 4.1 1.7s3-0.6 4.1-1.7c2.3-2.3 2.3-6 0-8.2l-68.2-62.4zM270.6 51.9c0-14.4 11.7-26.1 26.1-26.1s26.1 11.7 26.1 26.1-11.7 26.1-26.1 26.1-26.1-11.7-26.1-26.1zm-132.6 376c-21.5 0-39-17.5-39-39s17.5-39 39-39 39 17.5 39 39-17.5 39-39 39zm258 0c-21.5 0-39-17.5-39-39s17.5-39 39-39 39 17.5 39 39-17.5 39-39 39z"/>
                </svg>
            </span>
            <span class="category-text"><b>A2.1.</b> Motocicleta, ciclomotor y triciclo hasta 150cc.</span>
        </div>
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                </svg>
            </span>
            <span class="category-text"><b>B1.</b> Automóviles, utilitarios, camioneta y casa rodante hasta 3500kg.</span>
        </div>
    </div>

    <div class="observations-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="escudo-argentino">
        <div class="obs-content">
            <div><b>Grupo y Factor: RH+</b></div>
            <div><b>CUIL: 20-38638395-4</b></div>
            <div><b>Observaciones: NINGUNA</b></div>
        </div>
    </div>

    <div class="footer-reverso">    
        <div class="lnc-text">LNC</div>
        <div class="barcode"></div>
        <div class="signature-box">
            <div style="border-bottom: 1px solid #000;">NICOLAS NAIDICH</div>
            <b>Responsable</b>
        </div>
    </div>    

</div>    

<script>    
async function generarPDF(){    
    const { jsPDF } = window.jspdf;    
    const canvas = await html2canvas(document.getElementById("carnet"), { scale:4 });    
    const img = canvas.toDataURL("image/png");    
    const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:[85.6, 54] });    
    pdf.addImage(img, "PNG", 0, 0, 85.6, 54);    
    pdf.save("reverso_lnc.pdf");    
}    
</script>    

</body>    
</html>

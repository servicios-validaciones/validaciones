<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Secundario Pro Vertical</title>

<style>
body {
  margin: 0;
  background: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  font-family: Arial;
}

.sello {
  filter: contrast(1.08) brightness(0.96);
}

input {
  padding: 6px;
  width: 260px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<input id="imgLink" placeholder="Pegá link de imagen (escudo)" />
<button onclick="descargarPNG()">Descargar PNG</button>

<svg id="sello" class="sello" width="260" height="360" viewBox="0 0 260 360" xmlns="http://www.w3.org/2000/svg">

  <g stroke="#111" fill="none">

    <!-- ELIPSES -->
    <ellipse cx="130" cy="180" rx="108" ry="158" stroke-width="3.5"/>
    <ellipse cx="130" cy="180" rx="96" ry="138" stroke-width="1.2"/>

    <defs>
      <!-- MISMA CURVATURA Y SEPARACIÓN ARRIBA Y ABAJO -->
      <path id="topArc" d="M 27 180 A 102 148 0 0 1 233 180" />
      <path id="bottomArc" d="M 27 180 A 102 148 0 0 0 233 180" />

      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2"/>
        <feComponentTransfer>
          <feFuncA type="table" tableValues="0 0.10"/>
        </feComponentTransfer>
      </filter>
    </defs>

    <!-- TEXTO SUPERIOR -->
    <text contenteditable="true" font-size="12.5" letter-spacing="2"
          font-family="Arial, Helvetica, sans-serif">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        DIRECCIÓN GENERAL DE CULTURA Y EDUCACIÓN 
      </textPath>
    </text>

    <!-- TEXTO INFERIOR -->
    <text contenteditable="true" font-size="11.5" letter-spacing="1.7"
          font-family="Arial, Helvetica, sans-serif">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        PROVINCIA DE BUENOS AIRES 
      </textPath>
    </text>

    <!-- ESCUDO -->
    <foreignObject x="45" y="75" width="170" height="170">
      <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;">
        <img id="logo" src="https://logoeps.com/wp-content/uploads/2013/01/escudo-de-la-republica-argentina-logo-vector.png" 
             style="width:170px; height:170px; object-fit:contain;" />
      </body>
    </foreignObject>

    <!-- TEXTO CENTRAL -->
    <text contenteditable="true" x="130" y="255"
          text-anchor="middle"
          font-size="11.5"
          font-family="Arial, Helvetica, sans-serif">
    </text>

  </g>

  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.25"/>
</svg>

<script>
// cambiar imagen en vivo
const input = document.getElementById("imgLink");
const logo = document.getElementById("logo");

input.addEventListener("input", () => {
  if(input.value.trim() !== ""){
    logo.src = input.value;
  }
});

// descargar PNG
function descargarPNG() {
  const svg = document.getElementById("sello");
  const serializer = new XMLSerializer();
  const source = serializer.serializeToString(svg);

  const img = new Image();
  const svgBlob = new Blob([source], {type: "image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(svgBlob);

  img.onload = function() {
    const canvas = document.createElement("canvas");
    canvas.width = 260;
    canvas.height = 360;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);

    const a = document.createElement("a");
    a.download = "sello.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  };

  img.src = url;
}
</script>

</body>
</html>

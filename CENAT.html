<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificado CENAT</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background:#e9ecef;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

.certificado {
    width:700px;
    background:#fff;
    border:1px solid #000;
    padding:20px;
    color:#000;
}

/* ENCABEZADO */
.header {
    text-align:center;
    border-bottom:3px solid #000;
    padding-bottom:10px;
    margin-bottom:15px;
}

.header h1 {
    font-size:18px;
    margin:2px;
}

.header h2 {
    font-size:16px;
    margin:2px;
}

/* BLOQUES */
.row {
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.col {
    width:48%;
}

.label {
    font-weight:bold;
    font-size:13px;
}

.value {
    border-bottom:1px solid #000;
    padding:3px 0;
    font-size:14px;
}

/* DESTACADO */
.destacado {
    margin-top:10px;
    padding:10px;
    border:1px solid #000;
    background:#f5f5f5;
    font-size:13px;
}

/* BOTON */
.btn {
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#007bff;
    color:#fff;
    cursor:pointer;
    border-radius:5px;
    font-size:14px;
}

.btn:hover {
    background:#0056b3;
}

/* FORM */
.formulario {
    width:700px;
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ccc;
}

.formulario input, .formulario select {
    width:100%;
    padding:6px;
    margin:5px 0 10px;
}
</style>
</head>

<body>

<div class="formulario">
    <input placeholder="Apellido y Nombre" oninput="set('nombre', this.value)">
    <input placeholder="DNI" oninput="set('dni', this.value)">
    
    <select onchange="set('sexo', this.value)">
        <option value="">Sexo</option>
        <option>Masculino</option>
        <option>Femenino</option>
    </select>

    <input placeholder="Jurisdicción" oninput="set('jurisdiccion', this.value)">
    <input placeholder="Estado (ej: SIN INFRACCIONES)" oninput="set('estado', this.value)">
    <input placeholder="Importe" oninput="set('importe', this.value)">
</div>

<div id="cenat" class="certificado">

    <div class="header">
        <h1>AGENCIA NACIONAL DE SEGURIDAD VIAL</h1>
        <h2>Certificado Nacional de Antecedentes de Tránsito</h2>
        <h2>(CENAT)</h2>
    </div>

    <div class="row">
        <div class="col">
            <div class="label">Apellido y Nombre</div>
            <div class="value" id="nombre">-</div>
        </div>
        <div class="col">
            <div class="label">DNI</div>
            <div class="value" id="dni">-</div>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <div class="label">Sexo</div>
            <div class="value" id="sexo">-</div>
        </div>
        <div class="col">
            <div class="label">Jurisdicción</div>
            <div class="value" id="jurisdiccion">-</div>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <div class="label">Fecha de emisión</div>
            <div class="value" id="emision"></div>
        </div>
        <div class="col">
            <div class="label">Fecha de vencimiento</div>
            <div class="value" id="vencimiento"></div>
        </div>
    </div>

    <div class="destacado">
        <strong>Estado:</strong> <span id="estado">-</span><br>
    </div>

    <div class="row">
        <div class="col">
            <div class="label">Importe abonado</div>
            <div class="value" id="importe">-</div>
        </div>
        <div class="col">
            <div class="label">N° de trámite</div>
            <div class="value" id="tramite"></div>
        </div>
    </div>

</div>

<button class="btn" onclick="descargarPDF()">Descargar PDF</button>

<script>
function set(id, value) {
    document.getElementById(id).innerText = value || "-";
}

// FECHAS AUTOMÁTICAS
function generarFechas() {
    let hoy = new Date();
    let venc = new Date();
    venc.setDate(hoy.getDate() + 60);

    document.getElementById("emision").innerText = format(hoy);
    document.getElementById("vencimiento").innerText = format(venc);
}

function format(fecha) {
    return fecha.toLocaleDateString('es-AR');
}

// GENERAR NUMEROS
function generarNumeros() {
    document.getElementById("tramite").innerText =
        Math.floor(Math.random() * 1e12).toString().padStart(12, '0');
}

generarFechas();
generarNumeros();

// PDF
async function descargarPDF() {
    const { jsPDF } = window.jspdf;
    const elemento = document.getElementById("cenat");

    const canvas = await html2canvas(elemento, { scale: 2 });
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p", "mm", "a4");
    const width = pdf.internal.pageSize.getWidth();

    const imgProps = pdf.getImageProperties(imgData);
    const pdfHeight = (imgProps.height * width) / imgProps.width;

    pdf.addImage(imgData, "PNG", 0, 10, width, pdfHeight);
    pdf.save("Certificado_CENAT.pdf");
}
</script>

</body>
</html>

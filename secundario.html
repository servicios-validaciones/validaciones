<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Escuela Secundaria Oval</title>

<style>
body {
  margin: 0;
  background: transparent;
}

.sello {
  filter: contrast(1.1) brightness(0.95);
}
</style>
</head>

<body>

<svg class="sello" width="360" height="260" viewBox="0 0 360 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Color tinta -->
  <g stroke="#1a1a1a" fill="none">

    <!-- Ovalo externo -->
    <ellipse cx="180" cy="130" rx="170" ry="115" stroke-width="4"/>

    <!-- Ovalo interno -->
    <ellipse cx="180" cy="130" rx="150" ry="95" stroke-width="1.5"/>

    <!-- Definiciones de curvas -->
    <defs>
      <path id="topArc" d="M 40 130 A 140 90 0 0 1 320 130" />
      <path id="bottomArc" d="M 40 130 A 140 90 0 0 0 320 130" />
    </defs>

    <!-- Texto superior -->
    <text font-size="14" letter-spacing="2" font-family="Arial, sans-serif">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        ESCUELA DE EDUCACIÓN SECUNDARIA N° 12
      </textPath>
    </text>

    <!-- Texto inferior -->
    <text font-size="13" letter-spacing="2" font-family="Arial, sans-serif">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        CUE: 06-12345678-0 · PROVINCIA DE BUENOS AIRES
      </textPath>
    </text>

    <!-- Centro -->
    <text x="180" y="115" text-anchor="middle"
          font-size="16"
          font-weight="bold"
          font-family="Arial, sans-serif">
      “JOSÉ HERNÁNDEZ”
    </text>

    <line x1="90" y1="130" x2="270" y2="130"
          stroke="#000"
          stroke-width="1"/>

    <text x="180" y="155" text-anchor="middle"
          font-size="13"
          font-family="Arial, sans-serif">
      DIRECCIÓN GENERAL DE CULTURA Y EDUCACIÓN
    </text>

  </g>

</svg>

</body>
        </html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Secundario Simétrico</title>

<style>
body {
  margin: 0;
  background: transparent;
}

.sello {
  filter: contrast(1.08) brightness(0.96);
}
</style>
</head>

<body>

<svg class="sello" width="260" height="360" viewBox="0 0 260 360" xmlns="http://www.w3.org/2000/svg">

  <!-- ESCUDO ARGENTINO SIMPLIFICADO (marca de agua) -->
  <g opacity="0.08">
    <!-- Óvalo escudo -->
    <ellipse cx="130" cy="180" rx="45" ry="65" fill="#000"/>

    <!-- División -->
    <rect x="85" y="180" width="90" height="65" fill="#000"/>

    <!-- Sol -->
    <circle cx="130" cy="145" r="10" fill="#000"/>

    <!-- Manos simplificadas -->
    <ellipse cx="130" cy="190" rx="20" ry="10" fill="#fff"/>
    
    <!-- Pica -->
    <line x1="130" y1="160" x2="130" y2="220" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- SELLO -->
  <g stroke="#111" fill="none">

    <!-- Óvalos PERFECTAMENTE simétricos -->
    <ellipse cx="130" cy="180" rx="110" ry="160" stroke-width="3.5"/>
    <ellipse cx="130" cy="180" rx="95" ry="140" stroke-width="1.2"/>

    <!-- Curvas -->
    <defs>
      <path id="topArc" d="M 40 180 A 90 140 0 0 1 220 180" />
      <path id="bottomArc" d="M 40 180 A 90 140 0 0 0 220 180" />
    </defs>

    <!-- Texto superior -->
    <text font-size="13" letter-spacing="2"
          font-family="Arial, sans-serif">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        ESCUELA DE EDUCACIÓN SECUNDARIA N° 12
      </textPath>
    </text>

    <!-- Texto inferior -->
    <text font-size="12" letter-spacing="1.6"
          font-family="Arial, sans-serif">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        CUE 06-12345678-0 · PROVINCIA DE BUENOS AIRES
      </textPath>
    </text>

    <!-- Centro -->
    <text x="130" y="155"
          text-anchor="middle"
          font-size="16"
          font-weight="bold"
          font-family="Times New Roman, serif">
      “JOSÉ HERNÁNDEZ”
    </text>

    <!-- Línea -->
    <line x1="70" y1="180" x2="190" y2="180"
          stroke="#111"
          stroke-width="1"/>

    <!-- Texto inferior -->
    <text x="130" y="210"
          text-anchor="middle"
          font-size="12"
          font-family="Arial, sans-serif">
      DIRECCIÓN GENERAL DE CULTURA Y EDUCACIÓN
    </text>

  </g>

</svg>

</body>
</html>

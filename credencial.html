<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Carnet de Conducir</title>

<!-- Librerías para PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
}

/* BOTÓN */
.btn {
    margin: 15px;
    padding: 10px 20px;
    background: #005691;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* CARNET */
.carnet-container {
    width: 500px;
    height: 315px;
    background-color: #fff;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    overflow: hidden;
    position: relative;
    border: 1px solid #ccc;
}

/* HEADER */
.header {
    background-color: #005691;
    color: white;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    height: 35px;
}

.header-title {
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    flex-grow: 1;
}

/* CONTENIDO */
.content {
    padding: 10px;
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 10px;
    height: calc(100% - 70px);
    box-sizing: border-box;
}

/* FOTO */
.photo-placeholder {
    width: 100px;
    height: 120px;
    background: #e0e0e0;
    border: 2px dashed #999;
    border-radius: 5px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    overflow: hidden;
    font-size: 10px;
}

.photo-placeholder img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

/* DATOS */
.data-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    font-size: 10px;
}

.label {
    font-weight: bold;
}

.editable-input {
    padding: 2px;
    font-size: 10px;
    border: 1px solid #ccc;
}

/* FIRMA */
.signature-placeholder {
    height: 25px;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
}

/* FOOTER */
.footer {
    background-color: #005691;
    color: white;
    padding: 6px 10px;
    height: 35px;
    position: absolute;
    bottom: 0;
    width: 100%;
    font-size: 10px;
}
</style>
</head>

<body>

<button class="btn" onclick="generarPDF()">Descargar PDF</button>

<div class="carnet-container" id="carnet">
    
    <div class="header">
        <div class="header-title">
            REPÚBLICA ARGENTINA<br>
            Río Negro - General Roca
        </div>
    </div>

    <div class="content">

        <!-- FOTO -->
        <div>
            <div class="photo-placeholder" onclick="document.getElementById('fileInput').click();">
                <span id="placeholderText">Subir foto</span>
                <img id="photoPreview">
            </div>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(this)">
        </div>

        <!-- DATOS -->
        <div class="data-section">
            <div>
                <div class="label">Apellido</div>
                <input class="editable-input" value="Ceballos">
            </div>

            <div>
                <div class="label">Nombre</div>
                <input class="editable-input" value="Angel Ceferino">
            </div>

            <div style="grid-column:1/-1;">
                <div class="label">Domicilio</div>
                <input class="editable-input" value="GENERAL ROCA">
            </div>

            <div>
                <div class="label">Nacimiento</div>
                <input class="editable-input" value="21/07/1981">
            </div>

            <div>
                <div class="label">Otorgamiento</div>
                <input class="editable-input" value="25/03/2026">
            </div>

            <div>
                <div class="label">Vencimiento</div>
                <input class="editable-input" value="25/03/2031">
            </div>

            <div>
                <div class="label">Clases</div>
                <input class="editable-input" value="E1 E2 D3">
            </div>

            <div>
                <div class="label">Firma</div>
                <div class="signature-placeholder">Firma</div>
            </div>
        </div>

    </div>

    <div class="footer">
        SEGURIDAD VIAL - Argentina
    </div>

</div>

<script>
// PREVISUALIZAR FOTO
function previewImage(input) {
    let preview = document.getElementById('photoPreview');
    let text = document.getElementById('placeholderText');

    let reader = new FileReader();
    reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        text.style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
}

// GENERAR PDF
async function generarPDF() {
    const { jsPDF } = window.jspdf;

    let carnet = document.getElementById("carnet");

    const canvas = await html2canvas(carnet, {
        scale: 3
    });

    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF({
        orientation: "landscape",
        unit: "mm",
        format: [85.6, 54] // tamaño real tarjeta
    });

    pdf.addImage(imgData, "PNG", 0, 0, 85.6, 54);
    pdf.save("carnet.pdf");
}
</script>

</body>
</html>

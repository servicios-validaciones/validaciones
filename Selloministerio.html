<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Oficial Realista</title>

<style>
body {
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.sello {
  width: 340px;
  height: 340px;
  border-radius: 50%;
  position: relative;
}

/* DOBLE ARO NEGRO */
.sello::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border: 5px solid black;
  border-radius: 50%;
}

.sello::after {
  content: "";
  position: absolute;
  width: 290px;
  height: 290px;
  border: 2px solid black;
  border-radius: 50%;
  top: 25px;
  left: 25px;
}

/* TEXTO */
.texto {
  position: absolute;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  color: black;
  text-align: center;
}

.texto span {
  position: absolute;
  left: 50%;
  transform-origin: 0 170px;
  font-size: 13px;
  font-weight: bold;
}

/* ESCUDO */
.escudo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.escudo img {
  width: 110px;
  height: 110px;
  object-fit: contain;
  filter: grayscale(100%) contrast(300%) brightness(0);
}

/* ESTRELLAS */
.estrella {
  position: absolute;
  font-size: 18px;
  font-weight: bold;
}

.estrella.izq {
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
}

.estrella.der {
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
}

/* EFECTO TINTA REAL */
.tinta {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: url("https://www.transparenttextures.com/patterns/ink.png");
  opacity: 0.25;
  border-radius: 50%;
  pointer-events: none;
}
</style>

</head>
<body>

<div class="sello">

  <!-- EFECTO TINTA -->
  <div class="tinta"></div>

  <!-- TEXTO SUPERIOR -->
  <div class="texto" id="textoSuperior"></div>

  <!-- TEXTO INFERIOR -->
  <div class="texto" id="textoInferior"></div>

  <!-- ESTRELLAS -->
  <div class="estrella izq">★</div>
  <div class="estrella der">★</div>

  <!-- ESCUDO -->
  <div class="escudo">
    <img id="logo" src="https://via.placeholder.com/120">
  </div>

</div>

<script>
function textoCircular(id, texto, radio, inicio, direccion = 1) {
  const contenedor = document.getElementById(id);
  contenedor.innerHTML = "";
  const letras = texto.split("");

  letras.forEach((letra, i) => {
    const span = document.createElement("span");
    span.innerText = letra;

    let angulo = inicio + (i * (180 / (letras.length - 1))) * direccion;

    span.style.transform =
      `rotate(${angulo}deg)
       translate(${radio}px)
       rotate(${angulo > 90 || angulo < -90 ? 180 : 0}deg)`;

    contenedor.appendChild(span);
  });
}

/* 🔧 TEXTO EDITABLE */
textoCircular(
  "textoSuperior",
  "DIRECCION GENERAL DE CULTURA Y EDUCACION",
  150,
  -90,
  1
);

textoCircular(
  "textoInferior",
  "PROVINCIA DE BUENOS AIRES",
  150,
  90,
  -1
);

/* 🔧 CAMBIAR ESCUDO */
document.getElementById("logo").src = "https://via.placeholder.com/120";
</script>

</body>
</html>

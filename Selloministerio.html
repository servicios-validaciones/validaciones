<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Secundario Pro Vertical</title>

<style>
body {
  margin: 0;
  background: transparent;
}

/* tinta más real */
.sello {
  filter: contrast(1.08) brightness(0.96);
}
</style>
</head>

<body>

<svg class="sello" width="260" height="360" viewBox="0 0 260 360" xmlns="http://www.w3.org/2000/svg">

  <!-- Grupo principal -->
  <g stroke="#111" fill="none">

    <!-- Óvalo externo (más natural) -->
    <ellipse cx="130" cy="180" rx="108" ry="158" stroke-width="3.5"/>

    <!-- Óvalo interno -->
    <ellipse cx="130" cy="180" rx="96" ry="138" stroke-width="1.2"/>

    <!-- Definiciones -->
    <defs>
      <path id="topArc" d="M 45 180 A 85 135 0 0 1 215 180" />
      <path id="bottomArc" d="M 45 180 A 85 135 0 0 0 215 180" />

      <!-- desgaste sutil -->
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2"/>
        <feComponentTransfer>
          <feFuncA type="table" tableValues="0 0.10"/>
        </feComponentTransfer>
      </filter>
    </defs>

    <!-- Texto superior -->
    <text font-size="12.5" letter-spacing="1.8"
          font-family="Arial, Helvetica, sans-serif">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        ESCUELA DE EDUCACIÓN SECUNDARIA N° 12
      </textPath>
    </text>

    <!-- Texto inferior -->
    <text font-size="11.5" letter-spacing="1.5"
          font-family="Arial, Helvetica, sans-serif">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        CUE 06-12345678-0 · PROV. BS. AS.
      </textPath>
    </text>

    <!-- Nombre (más protagonista) -->
    <text x="130" y="150"
          text-anchor="middle"
          font-size="16"
          font-weight="bold"
          font-family="Times New Roman, serif"
          letter-spacing="1">
      “JOSÉ HERNÁNDEZ”
    </text>

    <!-- Línea más fina -->
    <line x1="65" y1="180" x2="195" y2="180"
          stroke="#111"
          stroke-width="0.8"/>

    <!-- Texto institucional -->
    <text x="130" y="205"
          text-anchor="middle"
          font-size="11.5"
          font-family="Arial, Helvetica, sans-serif">
      DIR. GRAL. DE CULTURA Y EDUCACIÓN
    </text>

  </g>

  <!-- textura muy leve -->
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.25"/>

</svg>

</body>
</html>

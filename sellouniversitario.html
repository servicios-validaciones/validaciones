<!DOCTYPE html>  
<html lang="es">  
<head>  
<meta charset="UTF-8">  
<title>Editor de Sellos Universitarios v1.32.0</title>  

<style>  
body {  
  margin: 0;  
  background: #f4f4f4;
  font-family: Arial, sans-serif;
}  

.header{
  background:#111;
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:bold;
}

.panel{
  background:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.panel label{
  font-size:12px;
  display:flex;
  flex-direction:column;
}

.panel input{
  padding:5px;
}

.container{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

/* efecto tinta más realista */  
.sello {  
  filter: contrast(1.15) brightness(0.95);  
}  
</style>  
</head>  

<body>  

<div class="header">
Editor de Sellos Universitarios v1.32.0
</div>

<div class="panel">
  <label>Texto superior
    <input id="topInput" value="UNIVERSIDAD EMPRESARIAL">
  </label>

  <label>Texto inferior
    <input id="bottomInput" value="REPÚBLICA ARGENTINA">
  </label>

  <label>Texto central
    <input id="centerInput" value="SIGLO 21">
  </label>

  <!-- NUEVO -->
  <label>Segundo renglón
    <input id="center2Input" value="">
  </label>

  <label>Subtexto
    <input id="subInput" value="CÓRDOBA">
  </label>

  <label>Color
    <input type="color" id="colorInput" value="#1c2e8a">
  </label>

  <!-- NUEVO -->
  <button onclick="descargarPNG()">Descargar PNG</button>
</div>

<div class="container">

<svg id="svg" class="sello" width="320" height="320" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">  

  <g id="grupo" stroke="#1c2e8a" fill="none">  

    <circle cx="150" cy="150" r="138" stroke-width="4.5"/>  
    <circle cx="150" cy="150" r="122" stroke-width="1.8"/>  
    <circle cx="150" cy="150" r="118" stroke-width="0.8"/>  

    <defs>  
      <path id="topArc" d="M 45 150 A 105 105 0 0 1 255 150" />  
      <path id="bottomArc" d="M 45 150 A 105 105 0 0 0 255 150" />  

      <filter id="grain">  
        <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2"/>  
        <feComponentTransfer>  
          <feFuncA type="table" tableValues="0 0.12"/>  
        </feComponentTransfer>  
      </filter>  
    </defs>  

    <!-- Texto superior -->  
    <text font-size="13" letter-spacing="2.5" font-family="Times New Roman, serif">  
      <textPath id="topText" href="#topArc" startOffset="50%" text-anchor="middle">  
        UNIVERSIDAD EMPRESARIAL  
      </textPath>  
    </text>  

    <!-- Texto inferior -->  
    <text font-size="13" letter-spacing="2.5" font-family="Times New Roman, serif">  
      <textPath id="bottomText" href="#bottomArc" startOffset="50%" text-anchor="middle">  
        REPÚBLICA ARGENTINA  
      </textPath>  
    </text>  

    <!-- Centro -->
    <text id="centerText" x="150" y="138" text-anchor="middle"  
      font-size="24"  
      font-weight="700"  
      font-family="Georgia, serif"  
      letter-spacing="0.0">  
  SIGLO 21  
    </text>  

    <!-- NUEVO segundo renglón -->
    <text id="centerText2" x="150" y="150" text-anchor="middle"  
          font-size="16"  
          font-family="Times New Roman, serif"  
          letter-spacing="1.5">  
    </text>  

    <line x1="95" y1="162" x2="205" y2="162" stroke-width="1.2"/>  

    <!-- Subtexto -->  
    <text id="subText" x="150" y="184" text-anchor="middle"  
          font-size="13"  
          font-family="Times New Roman, serif"  
          letter-spacing="1.5">  
      CÓRDOBA  
    </text>  

  </g>  

  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.25"/>  

</svg>  

</div>

<script>

// inputs
const topInput = document.getElementById("topInput");
const bottomInput = document.getElementById("bottomInput");
const centerInput = document.getElementById("centerInput");
const center2Input = document.getElementById("center2Input"); // nuevo
const subInput = document.getElementById("subInput");
const colorInput = document.getElementById("colorInput");

// elementos svg
const topText = document.getElementById("topText");
const bottomText = document.getElementById("bottomText");
const centerText = document.getElementById("centerText");
const centerText2 = document.getElementById("centerText2"); // nuevo
const subText = document.getElementById("subText");
const grupo = document.getElementById("grupo");

// eventos
topInput.oninput = () => topText.textContent = topInput.value;
bottomInput.oninput = () => bottomText.textContent = bottomInput.value;
centerInput.oninput = () => centerText.textContent = centerInput.value;
center2Input.oninput = () => centerText2.textContent = center2Input.value; // nuevo
subInput.oninput = () => subText.textContent = subInput.value;

colorInput.oninput = () => {
  grupo.setAttribute("stroke", colorInput.value);
  grupo.setAttribute("fill", colorInput.value);
};

// descarga PNG (nuevo)
function descargarPNG(){
  const svg = document.getElementById("svg");
  const serializer = new XMLSerializer();
  const svgString = serializer.serializeToString(svg);

  const canvas = document.createElement("canvas");
  canvas.width = 600;
  canvas.height = 600;

  const ctx = canvas.getContext("2d");
  const img = new Image();

  const blob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(blob);

  img.onload = function(){
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);

    const a = document.createElement("a");
    a.download = "sello.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  };

  img.src = url;
}

</script>

</body>  
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Argentina - Licencia Nacional de Conducir</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    background: #f2f2f2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* LOADER */
#loader {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: white;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 9999;
}
.spinner {
    width: 60px; height: 60px;
    border: 6px solid #e6e6e6; border-top: 6px solid #4338ca;
    border-radius: 50%; animation: girar 1s linear infinite;
}
@keyframes girar { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

header {
    background: #4338ca; color: white; text-align: center;
    padding: 14px; font-size: 20px; font-weight: 700;
}

.container {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    max-width: 420px; margin: auto; padding: 15px; width: 100%; box-sizing: border-box;
}

.info-box {
    background: white; border-radius: 10px; padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px;
    font-size: 14px; color: #444; width: 100%;
}

input {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;
    margin-top: 5px; font-size: 16px; box-sizing: border-box;
}

button {
    margin-top: 18px; background: #4338ca; color: white; border: none;
    padding: 12px; border-radius: 30px; width: 180px; font-size: 16px; cursor: pointer;
}

button:disabled { opacity: .5; }

/* --- EFECTO FLIP CARD (La Licencia) --- */
.card-container {
    perspective: 1000px;
    width: 100%;
    max-width: 350px;
    height: 220px;
    margin-top: 20px;
    display: none; /* Se muestra al consultar */
}

.card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

/* Clase que aplicaremos con JS para girar */
.is-flipped {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.card-back {
    transform: rotateY(180deg);
}

.card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Flecha para girar */
.flip-btn {
    background: #eee;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 10px;
    cursor: pointer;
    font-size: 20px;
    border: 1px solid #ccc;
}

#mensaje { margin-top: 15px; font-weight: 600; text-align: center;}
.verde { color: #22c55e; }
.rojo { color: #ef4444; }

footer { text-align: center; padding: 12px; color: #777; font-size: 13px; }

</style>
</head>
<body>

<div id="loader">
    <img src="https://mi.argentina.gob.ar/img/logos/LOGO_LOADING.png" style="width:120px;margin-bottom:20px;">
    <div class="spinner"></div>
    <p style="margin-top:15px;color:#4338ca;font-weight:600;">Cargando sistema...</p>
</div>

<header>Mi Argentina | Licencia Digital</header>

<div class="container">
    <h2>Consulta de Licencia</h2>
    <p style="text-align:center; font-size: 14px; color:#666;">Ingrese su DNI para visualizar su Licencia Nacional de Conducir.</p>

    <div class="info-box">
        <label>DNI del titular</label>
        <input type="text" id="dniInput" placeholder="Ej: 30123456" maxlength="8">
        <center><button id="consultarBtn" disabled>Consultar</button></center>
    </div>

    <div id="mensaje"></div>

    <div class="card-container" id="licenciaVisual">
        <div class="card-inner" id="cardInner">
            <div class="card-front">
                <img src="https://i.postimg.cc/HLw7X7hk/carnet.jpg" class="card-img" alt="Frente Licencia">
            </div>
            <div class="card-back">
                <img src="https://i.postimg.cc/tTDkdcMX/IMG-20260406-WA0034.jpg" class="card-img" alt="Dorso Licencia">
            </div>
        </div>
    </div>
    
    <div id="flipBtnContainer" style="display:none; flex-direction:column; align-items:center;">
        <div class="flip-btn" onclick="flipCard()">🔄</div>
        <p style="font-size:12px; color:#777;">Toca para ver el dorso</p>
    </div>

</div>

<footer>Centro de ayuda · Seguridad Vial</footer>

<script>
/* LOADER */
window.addEventListener("load",()=>{
    setTimeout(()=> { document.getElementById("loader").style.display="none"; }, 1000);
});

const dniInput = document.getElementById("dniInput");
const consultarBtn = document.getElementById("consultarBtn");
const mensaje = document.getElementById("mensaje");
const licenciaVisual = document.getElementById("licenciaVisual");
const flipBtnContainer = document.getElementById("flipBtnContainer");
const cardInner = document.getElementById("cardInner");

/* Base de datos simulada */
const padron = ["25904363", "29324931", "39992765", "12345678"];

dniInput.addEventListener("input", () => {
    consultarBtn.disabled = !(/^\d{7,8}$/.test(dniInput.value.trim()));
});

consultarBtn.addEventListener("click", () => {
    const dni = dniInput.value.trim();
    mensaje.innerHTML = "Buscando...";
    licenciaVisual.style.display = "none";
    flipBtnContainer.style.display = "none";

    setTimeout(() => {
        if (padron.includes(dni)) {
            mensaje.innerHTML = "<span class='verde'>¡Su documentación está lista!</span>";
            licenciaVisual.style.display = "block";
            flipBtnContainer.style.display = "flex";
        } else {
            mensaje.innerHTML = "<span class='rojo'>No se encontró licencia vinculada a este DNI.</span>";
        }
    }, 1500);
});

/* Función para girar la tarjeta */
function flipCard() {
    cardInner.classList.toggle('is-flipped');
}
</script>

</body>
</html>

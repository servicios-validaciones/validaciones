<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello estilo real invertido</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
  height: 100vh;
}

.sello {
  width: 260px;
  height: 360px;
  filter: contrast(2) brightness(1.1) grayscale(1);
}

button {
  padding: 8px 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<button onclick="descargarPNG()">Descargar PNG</button>

<svg id="sello" class="sello" viewBox="0 0 260 360" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- TEXTURA FUERTE -->
<filter id="ink">
  <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise"/>
  <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
  <feGaussianBlur stdDeviation="0.6"/>
  <feComponentTransfer>
    <feFuncR type="table" tableValues="0 1"/>
    <feFuncG type="table" tableValues="0 1"/>
    <feFuncB type="table" tableValues="0 1"/>
  </feComponentTransfer>
</filter>

<!-- BRILLO DESPAREJO -->
<filter id="shine">
  <feTurbulence type="fractalNoise" baseFrequency="0.3" numOctaves="2" result="t"/>
  <feBlend in="SourceGraphic" in2="t" mode="screen"/>
</filter>

<!-- ARCOS -->
<path id="topArc" d="M 22 180 A 108 158 0 0 1 238 180" />
<path id="bottomArc" d="M 22 180 A 108 158 0 0 0 238 180" />

</defs>

<g stroke="white" fill="none" filter="url(#ink)">

<!-- DOBLE BORDE -->
<ellipse cx="130" cy="180" rx="108" ry="158" stroke-width="3.5"/>
<ellipse cx="130" cy="180" rx="96" ry="138" stroke-width="1.2"/>

<!-- TEXTO SUPERIOR -->
<text font-size="13" letter-spacing="2" fill="white">
  <textPath href="#topArc" startOffset="50%" text-anchor="middle">
    DIRECCION GENERAL DE CULTURA Y EDUCACION
  </textPath>
</text>

<!-- TEXTO INFERIOR -->
<text font-size="12" letter-spacing="1.8" fill="white">
  <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
    ★ PROVINCIA DE BUENOS AIRES ★
  </textPath>
</text>

<!-- ESCUDO (SIMPLIFICADO BLANCO) -->
<g transform="translate(130,180) scale(0.9)" stroke="white" fill="none">
  <ellipse cx="0" cy="0" rx="30" ry="45" stroke-width="1.5"/>
  <line x1="-15" y1="0" x2="15" y2="0" stroke-width="1"/>
  <line x1="0" y1="-30" x2="0" y2="30" stroke-width="1"/>
  <circle cx="0" cy="-40" r="3" fill="white"/>
</g>

</g>

<!-- BRILLO LOCAL -->
<ellipse cx="200" cy="270" rx="40" ry="20" fill="white" opacity="0.15" filter="url(#shine)"/>

</svg>

<script>
function descargarPNG() {
  const svg = document.getElementById("sello");
  const serializer = new XMLSerializer();
  const source = serializer.serializeToString(svg);

  const img = new Image();
  const svgBlob = new Blob([source], {type: "image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(svgBlob);

  img.onload = function() {
    const canvas = document.createElement("canvas");
    canvas.width = 260;
    canvas.height = 360;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);

    const a = document.createElement("a");
    a.download = "sello.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  };

  img.src = url;
}
</script>

</body>
</html>

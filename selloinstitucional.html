<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editor de Sellos Universitarios v1.32.0</title>

<style>
body {
  margin: 0;
  background: #f4f4f4;
  font-family: Arial, sans-serif;
}

.header{
  background:#111;
  color:#fff;
  text-align:center;
  padding:12px;
  font-weight:bold;
}

.panel{
  background:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.panel label{
  font-size:12px;
  display:flex;
  flex-direction:column;
}

.container{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.sello{
  filter: contrast(1.15) brightness(0.92);
}
</style>
</head>

<body>

<div class="header">
Editor de Sellos Universitarios v1.32.0
</div>

<div class="panel">

<label>Texto aro superior
<input id="topOuterInput" value="Ministerio de Educación, Cultura, Ciencia y Tecnología">
</label>

<label>Texto aro inferior
<input id="bottomOuterInput" value="PROVINCIA DEL CHACO">
</label>

<label>Texto interior
<input id="innerInput" value="INSTITUTO SUPERIOR DE NIVEL TERCIARIO MACHAGAI">
</label>

<label>Texto adicional
<input id="extraInput" value="RESOLUCIÓN 123/24">
</label>

<label>Subir escudo
<input type="file" id="fileInput" accept="image/*">
</label>

<label>Tamaño
<input type="range" id="sizeInput" min="40" max="200" value="90">
</label>

<label>Rotación
<input type="range" id="rotateInput" min="-180" max="180" value="0">
</label>

<label>Color
<input type="color" id="colorInput" value="#333333">
</label>

<button onclick="centrarEscudo()">Centrar escudo</button>
<button onclick="descargarPNG()">Descargar PNG</button>

</div>

<div class="container">

<svg id="svg" class="sello" width="420" height="320" viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg">

<defs>
  <path id="outerTop" d="M 40 150 A 170 100 0 0 1 380 150"/>
  <path id="outerBottom" d="M 40 150 A 170 100 0 0 0 380 150"/>
  <path id="innerBottom" d="M 70 150 A 140 75 0 0 0 350 150"/>

  <clipPath id="clipEscudo">
    <ellipse cx="210" cy="150" rx="45" ry="65"/>
  </clipPath>

  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.18"/>
    </feComponentTransfer>
  </filter>
</defs>

<g id="grupo" stroke="#333" fill="none">

<ellipse cx="210" cy="150" rx="190" ry="120" stroke-width="3"/>
<ellipse cx="210" cy="150" rx="175" ry="110" stroke-width="1.5"/>
<ellipse cx="210" cy="150" rx="150" ry="90" stroke-width="2"/>

<text font-size="12" letter-spacing="1.5" font-family="Georgia, serif">
  <textPath id="topOuter" href="#outerTop" startOffset="50%" text-anchor="middle">
    Ministerio de Educación, Cultura, Ciencia y Tecnología
  </textPath>
</text>

<text font-size="13" letter-spacing="2" font-family="Georgia, serif">
  <textPath id="bottomOuter" href="#outerBottom" startOffset="50%" text-anchor="middle">
    PROVINCIA DEL CHACO
  </textPath>
</text>

<text font-size="12.5" letter-spacing="2" font-family="Georgia, serif">
  <textPath id="innerText" href="#innerBottom" startOffset="50%" text-anchor="middle">
    INSTITUTO SUPERIOR DE NIVEL TERCIARIO MACHAGAI
  </textPath>
</text>

<text id="extraText" x="210" y="150" text-anchor="middle"
      font-size="12"
      font-family="Georgia, serif">
  RESOLUCIÓN 123/24
</text>

</g>

<!-- ESCUDO -->
<g id="escudoGroup" clip-path="url(#clipEscudo)">
  <image id="escudoImg"
    x="165"
    y="85"
    width="90"
    height="130"
  />
</g>

<rect width="100%" height="100%" filter="url(#grain)" opacity="0.25"/>

</svg>

</div>

<script>

// inputs
const topOuterInput = document.getElementById("topOuterInput");
const bottomOuterInput = document.getElementById("bottomOuterInput");
const innerInput = document.getElementById("innerInput");
const extraInput = document.getElementById("extraInput");
const colorInput = document.getElementById("colorInput");
const fileInput = document.getElementById("fileInput");
const sizeInput = document.getElementById("sizeInput");
const rotateInput = document.getElementById("rotateInput");

// elementos
const topOuter = document.getElementById("topOuter");
const bottomOuter = document.getElementById("bottomOuter");
const innerText = document.getElementById("innerText");
const extraText = document.getElementById("extraText");
const grupo = document.getElementById("grupo");
const escudoImg = document.getElementById("escudoImg");

// texto
topOuterInput.oninput = () => topOuter.textContent = topOuterInput.value;
bottomOuterInput.oninput = () => bottomOuter.textContent = bottomOuterInput.value;
innerInput.oninput = () => innerText.textContent = innerInput.value;
extraInput.oninput = () => extraText.textContent = extraInput.value;

// color
colorInput.oninput = () => {
  grupo.setAttribute("stroke", colorInput.value);
};

// subir imagen
fileInput.onchange = function(){
  const reader = new FileReader();
  reader.onload = e => escudoImg.setAttribute("href", e.target.result);
  reader.readAsDataURL(fileInput.files[0]);
};

// estado escudo
let x=165,y=85,scale=1,rotation=0;
let dragging=false;

// tamaño
sizeInput.oninput = () => {
  const val = sizeInput.value;
  escudoImg.setAttribute("width", val);
  escudoImg.setAttribute("height", val*1.4);
};

// rotación
rotateInput.oninput = () => {
  rotation = rotateInput.value;
  actualizarTransform();
};

function actualizarTransform(){
  escudoImg.setAttribute("transform",
    `rotate(${rotation} 210 150) scale(${scale})`);
}

// mover
escudoImg.addEventListener("mousedown",()=>dragging=true);
document.addEventListener("mouseup",()=>dragging=false);
document.addEventListener("mousemove",(e)=>{
  if(!dragging)return;
  x=e.clientX-200;
  y=e.clientY-150;
  escudoImg.setAttribute("x",x);
  escudoImg.setAttribute("y",y);
});

// touch + pinch
let distInicial=0;

escudoImg.addEventListener("touchstart",(e)=>{
  dragging=true;
  if(e.touches.length===2){
    distInicial = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
});

document.addEventListener("touchmove",(e)=>{
  if(e.touches.length===2){
    let dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    scale = dist/distInicial;
    actualizarTransform();
  } else if(dragging){
    x=e.touches[0].clientX-200;
    y=e.touches[0].clientY-150;
    escudoImg.setAttribute("x",x);
    escudoImg.setAttribute("y",y);
  }
});

document.addEventListener("touchend",()=>dragging=false);

// centrar
function centrarEscudo(){
  x=165;y=85;scale=1;rotation=0;
  escudoImg.setAttribute("x",x);
  escudoImg.setAttribute("y",y);
  actualizarTransform();
  rotateInput.value=0;
}

// PNG FIX
function descargarPNG(){
  const svg = document.getElementById("svg");
  const clone = svg.cloneNode(true);

  const bg = document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("width","100%");
  bg.setAttribute("height","100%");
  bg.setAttribute("fill","#ffffff");
  clone.insertBefore(bg, clone.firstChild);

  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type:"image/svg+xml"});
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = ()=>{
    const canvas = document.createElement("canvas");
    canvas.width = 1000;
    canvas.height = 700;
    canvas.getContext("2d").drawImage(img,0,0,1000,700);

    const link = document.createElement("a");
    link.download="sello.png";
    link.href=canvas.toDataURL();
    link.click();
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

</script>

</body>
</html>

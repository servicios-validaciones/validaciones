<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Ministerio Editable</title>

<style>
body {
  margin: 0;
  background: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* PANEL */
.panel {
  background: #f5f5f5;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  width: 260px;
}

input {
  padding: 5px;
  font-size: 12px;
}

/* BOTÓN */
button {
  padding: 8px;
  border: none;
  background: black;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* SELLO */
.sello {
  filter: contrast(1.2) brightness(0.95);
}
</style>
</head>

<body>

<div class="panel">
  <input id="sup" value="MINISTERIO DE EDUCACIÓN">
  <input id="mid" value="DIRECCIÓN DE EDUCACIÓN SECUNDARIA">
  <input id="inf" value="REPÚBLICA ARGENTINA">
  <button onclick="actualizar()">Actualizar</button>
  <button onclick="descargarPNG()">Descargar PNG</button>
</div>

<svg id="svgSello" class="sello" width="260" height="360" viewBox="0 0 260 360">

  <defs>
    <!-- textura tinta -->
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3"/>
      <feDisplacementMap in="SourceGraphic" scale="0.8"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.2"/>
      </feComponentTransfer>
    </filter>

    <filter id="rough">
      <feTurbulence type="turbulence" baseFrequency="0.015"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>

    <path id="topArc" d="M 45 180 A 85 135 0 0 1 215 180"/>
    <path id="bottomArc" d="M 45 180 A 85 135 0 0 0 215 180"/>
  </defs>

  <g stroke="#000" fill="none" filter="url(#rough)">

    <!-- Óvalos -->
    <ellipse cx="130" cy="180" rx="108" ry="158" stroke-width="3.2"/>
    <ellipse cx="130" cy="180" rx="96" ry="138" stroke-width="1.2"/>

    <!-- TEXTO SUPERIOR -->
    <text font-size="12.5" letter-spacing="1.8" fill="#000">
      <textPath id="textSup" href="#topArc" startOffset="50%" text-anchor="middle">
        MINISTERIO DE EDUCACIÓN
      </textPath>
    </text>

    <!-- TEXTO INFERIOR -->
    <text font-size="11.5" letter-spacing="1.4" fill="#000">
      <textPath id="textInf" href="#bottomArc" startOffset="50%" text-anchor="middle">
        REPÚBLICA ARGENTINA
      </textPath>
    </text>

    <!-- TEXTO CENTRAL -->
    <text id="textMid"
          x="130" y="165"
          text-anchor="middle"
          font-size="11"
          font-weight="bold"
          fill="#000">
      DIRECCIÓN DE EDUCACIÓN SECUNDARIA
    </text>

    <!-- línea -->
    <line x1="70" y1="185" x2="190" y2="185" stroke="#000" stroke-width="1"/>

    <!-- ESCUDO ARGENTINO -->
    <image href="https://upload.wikimedia.org/wikipedia/commons/1/1a/Coat_of_arms_of_Argentina.svg"
           x="90" y="200"
           width="80"
           height="80"
           style="filter: grayscale(100%) contrast(300%) brightness(0);"/>
  </g>

  <!-- tinta -->
  <rect width="100%" height="100%" filter="url(#ink)" opacity="0.2"/>

</svg>

<script>
function actualizar() {
  document.getElementById("textSup").textContent =
    document.getElementById("sup").value;

  document.getElementById("textMid").textContent =
    document.getElementById("mid").value;

  document.getElementById("textInf").textContent =
    document.getElementById("inf").value;
}

function descargarPNG() {
  const svg = document.getElementById("svgSello");
  const data = new XMLSerializer().serializeToString(svg);

  const img = new Image();
  const blob = new Blob([data], {type: "image/svg+xml"});
  const url = URL.createObjectURL(blob);

  img.onload = function () {
    const canvas = document.createElement("canvas");
    canvas.width = 520;
    canvas.height = 720;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "sello.png";
    a.click();

    URL.revokeObjectURL(url);
  };

  img.src = url;
}
</script>

</body>
</html>

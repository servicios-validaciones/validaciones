<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sello Universitario Ultra</title>

<style>
body {
  margin: 0;
  background: transparent;
}

/* efecto tinta más realista */
.sello {
  filter: contrast(1.15) brightness(0.95);
}
</style>
</head>

<body>

<svg class="sello" width="320" height="320" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Color institucional más sobrio -->
  <g stroke="#1c2e8a" fill="none">

    <!-- Aro externo (más dominante) -->
    <circle cx="150" cy="150" r="138" stroke-width="4.5"/>

    <!-- Aro medio -->
    <circle cx="150" cy="150" r="122" stroke-width="1.8"/>

    <!-- Aro interno fino -->
    <circle cx="150" cy="150" r="118" stroke-width="0.8"/>

    <!-- Definiciones -->
    <defs>
      <path id="topArc" d="M 45 150 A 105 105 0 0 1 255 150" />
      <path id="bottomArc" d="M 45 150 A 105 105 0 0 0 255 150" />

      <!-- textura sutil -->
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2"/>
        <feComponentTransfer>
          <feFuncA type="table" tableValues="0 0.12"/>
        </feComponentTransfer>
      </filter>
    </defs>

    <!-- Texto superior -->
    <text font-size="13" fill="#1c2e8a" letter-spacing="2.5" font-family="Times New Roman, serif">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        UNIVERSIDAD EMPRESARIAL
      </textPath>
    </text>

    <!-- Texto inferior -->
    <text font-size="13" fill="#1c2e8a" letter-spacing="2.5" font-family="Times New Roman, serif">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        REPÚBLICA ARGENTINA
      </textPath>
    </text>

    <!-- Centro principal -->
    <text x="150" y="138" text-anchor="middle"
          font-size="24"
          font-weight="bold"
          fill="#1c2e8a"
          font-family="Times New Roman, serif"
          letter-spacing="2">
      SIGLO 21
    </text>

    <!-- Línea institucional -->
    <line x1="95" y1="152" x2="205" y2="152"
          stroke="#1c2e8a"
          stroke-width="1.2"/>

    <!-- Subtexto -->
    <text x="150" y="174" text-anchor="middle"
          font-size="13"
          fill="#1c2e8a"
          font-family="Times New Roman, serif"
          letter-spacing="1.5">
      CÓRDOBA
    </text>

  </g>

  <!-- textura desgaste MUY sutil -->
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.25"/>

</svg>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorso - Tarjeta de Conducción</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e6e6e6,#f7f7f7);
    font-family:"Inter","Segoe UI",Roboto,Arial,sans-serif;
}

/* botones */
.btn{
    position:absolute;
    left:10px;
    padding:8px 12px;
    background:#4aa3df;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
}

.btn:nth-child(1){ top:10px; }
.btn:nth-child(2){ top:45px; }

.card{
    width:500px;
    height:300px;
    background:#fff;
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.18);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    border:1px solid rgba(0,0,0,0.15);
}

/* HEADER estilo LNC */
.header{
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(6px);
    color:#0072bb;
    padding:10px;
    font-weight:600;
    font-size:14px;
    position:relative;
    text-align:center;
    letter-spacing:1px;
    text-transform:uppercase;
}

.header::after{
    content:"";
    position:absolute;
    bottom:0;
    left:15px;
    right:15px;
    height:3px;
    background:#00a3ff;
}

/* contenido */
.items{
    flex:1;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.item{
    border:1px solid rgba(0,0,0,0.12);
    border-radius:10px;
    padding:8px;
    display:flex;
    gap:10px;
    align-items:center;
    background:#fff;
}

.icon{
    font-size:20px;
}

.text{
    font-size:11.5px;
    color:#1a1a1a;
}

.text b{
    font-size:12px;
    font-weight:600;
}

/* footer */
.footer{
    background:#4aa3df;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    font-size:10px;
}

.qr{
    width:60px;
    height:60px;
    background:#fff;
    border-radius:6px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.qr img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}
</style>
</head>

<body>

<button class="btn" onclick="bgInput.click()">Fondo</button>
<button class="btn" style="top:45px;" onclick="qrInput.click()">Cargar QR</button>

<input type="file" id="bgInput" hidden onchange="cambiarFondo(this)">
<input type="file" id="qrInput" hidden onchange="cargarQR(this)">

<div class="card" id="card">

    <div class="header">
        Categorías habilitadas de conducción
    </div>

    <div class="items">

        <div class="item">
            <div class="icon">🏍️</div>
            <div class="text">
                <b>A2.1</b> Motocicletas, ciclomotores y triciclos livianos.
            </div>
        </div>

        <div class="item">
            <div class="icon">🚗</div>
            <div class="text">
                <b>B1</b> Automóviles, utilitarios y camionetas hasta 3500 kg.
            </div>
        </div>

    </div>

    <div class="footer">
        <div>
            Observaciones: Ninguna
        </div>

        <div class="qr">
            <img id="qrPreview">
        </div>
    </div>

</div>

<script>

function cambiarFondo(input){
    const card = document.getElementById("card");
    const reader = new FileReader();

    reader.onload = e=>{
        card.style.backgroundImage = `url('${e.target.result}')`;
        card.style.backgroundSize = "cover";
        card.style.backgroundPosition = "center";
        card.style.backgroundRepeat = "no-repeat";
    };

    reader.readAsDataURL(input.files[0]);
}

function cargarQR(input){
    const img = document.getElementById("qrPreview");
    const reader = new FileReader();

    reader.onload = e=>{
        img.src = e.target.result;
        img.style.display = "block";
    };

    reader.readAsDataURL(input.files[0]);
}

</script>

</body>
</html>

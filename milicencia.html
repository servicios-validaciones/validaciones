<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Argentina - Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
        }

        /* Navbar superior */
        .navbar {
            background-color: #373bbd;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .navbar img {
            height: 24px;
        }

        /* Contenedor principal */
        .content {
            padding: 40px 24px;
            flex-grow: 1;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            cursor: pointer;
        }

        .forgot-link {
            display: block;
            color: #373bbd;
            text-decoration: underline;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Botones */
        .btn-primary {
            background-color: #373bbd;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .section-signup {
            margin-top: 60px;
        }

        .btn-outline {
            background: white;
            color: #373bbd;
            border: 2px solid #373bbd;
            padding: 12px 32px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: fit-content;
        }

        /* Footer */
        footer {
            border-top: 1px solid #eee;
            padding: 40px 20px;
            text-align: center;
        }

        .footer-logo {
            color: #373bbd;
            font-weight: 900;
            font-size: 24px;
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
        }

        .footer-links a {
            color: #373bbd;
            text-decoration: underline;
            margin: 0 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <span style="color: white; font-weight: bold; font-size: 20px;">mi<span style="font-weight: normal;">Argentina</span></span>
    </header>

    <main class="content">
        <h2>Ingresá a tu cuenta</h2>

        <form>
            <div class="form-group">
                <label for="cuil">CUIL</label>
                <input type="text" id="cuil" name="cuil">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password">
                    <span class="eye-icon">👁️</span>
                </div>
            </div>

            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>

            <button type="submit" class="btn-primary">Ingresar</button>
        </form>

        <div class="section-signup">
            <h3>¿No tenés cuenta?</h3>
            <button class="btn-outline">Creá tu cuenta</button>
        </div>
    </main>

    <footer>
        <a href="#" class="footer-logo">miArgentina</a>
        <div class="footer-links">
            <a href="#">Preguntas frecuentes</a>
            <a href="#">Términos y condiciones</a>
        </div>
    </footer>

</body>
</html>

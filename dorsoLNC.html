<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>LNC - Reverso</title>    

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    

<style>    
body {    
    font-family: Arial, sans-serif; /* Cambio a Arial */
    background: linear-gradient(135deg, #e6e6e6, #f7f7f7);  
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    margin:0;    
    -webkit-font-smoothing: antialiased;  
}    

.btn-pdf{    
    position:absolute;    
    top:10px;    
    left:10px;    
    padding:8px 12px;    
    background:#4aa3df;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
    z-index: 10;
}    

.carnet-container {  
    width:500px;  
    height:315px;  
    overflow:hidden;  
    display:flex;  
    flex-direction:column;  
    border-radius:14px;  
    border:1px solid rgba(0,0,0,0.15);  
    box-shadow:0 8px 25px rgba(0,0,0,0.18);  
    background:#fff;  
    position: relative;
}  

.categories-box {
    margin: 10px 15px 5px 15px; 
    border: 1.5px solid #333;
    border-radius: 0px; 
    background: rgba(255, 255, 255, 0.7);
}

.category-row {
    display: flex;
    align-items: center;
    padding: 3px 10px; 
    border-bottom: 1.5px solid #333;
    font-size: 10px; 
    color: #1a1a1a;
}

.category-row:last-child { border-bottom: none; }

.category-icon {
    width: 35px; 
    display: flex;
    justify-content: center;
    margin-right: 12px;
}

.category-icon svg {
    width: 25px;
    height: auto;
    fill: #333;
}

.category-text b { font-weight: 700; }

.observations-section {
    padding: 0 15px 5px 15px;
    display: flex;
    align-items: flex-end; /* Alinea el escudo a la base */
    gap: 15px;
    flex-grow: 1;
    z-index: 1;
    margin-bottom: 2px; /* Acerca el contenido a la línea azul */
}

.escudo-argentino {
    width: 38px; /* Achicado un poquito */
    height: auto;
}

.obs-content {
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* Baja el texto */
    font-size: 10.5px;
    color: #1a1a1a;
    line-height: 1.3;
    padding-bottom: 2px;
}

.obs-row {
    display: flex;
    gap: 20px;
}

.obs-label {
    font-weight: 600;
    font-size: 9px;
    color: #333;
    text-transform: uppercase;
}

.lang-en {
    font-weight: normal !important; /* Letra común para inglés */
}

/* Barra inferior con azul más brillante */
.footer-reverso {    
    background:#ffffff; 
    width:100%;    
    height:55px;    
    display:flex;    
    align-items:center;    
    padding:0 15px;    
    box-sizing: border-box;
    border-top: 2.5px solid #007bff; /* Azul más brillante */
}    

.lnc-text {
    font-size: 26px;
    font-weight: 900;
    color: #005a8d;
    margin-right: 10px;
    text-shadow: 
        -1px -1px 0 #fff,  
         1px -1px 0 #fff,
        -1px  1px 0 #fff,
         1px  1px 0 #fff,
         0px 0px 2px rgba(0,0,0,0.5);
}

.barcode {
    flex-grow: 1;
    height: 38px;
    background: repeating-linear-gradient(
        90deg,
        #000,
        #000 1px,
        #fff 1px,
        #fff 3px,
        #000 3px,
        #000 4px,
        #fff 4px,
        #fff 5px
    );
    margin: 0 15px;
}

.signature-box {
    text-align: center;
    font-size: 8.5px;
    color: #000;
    min-width: 90px;
}

.sig-name {
    display: block;
    font-weight: bold;
    border-bottom: 1px solid #000;
    margin-bottom: 2px;
    text-transform: uppercase;
}

.watermark {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.1; 
}

.linea {
    width: 4px;
    height: 60px;
    background-color: #008c8c;
}

.texto {
    display: flex;
    flex-direction: column;
    font-size: 32px;
    font-weight: 900;
    color: #008c8c;
    line-height: 0.85;
    text-align: left;
}

</style>    
</head>    

<body>    

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>    
<button class="btn-pdf" style="top:45px;" onclick="bgInput.click()">Fondo</button>  
<input type="file" id="bgInput" hidden onchange="cambiarFondo(this)">  

<div class="carnet-container" id="carnet">    
    
    <div class="watermark">
        <div class="linea"></div>  
        <div class="texto">  
            <span>SEGURIDAD</span>  
            <span>VIAL</span>  
        </div>
    </div>

    <div class="categories-box" style="z-index: 1;">
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 24 24"><path d="M19.62,12l-1.5-2.25L17,9l-2.25-1.5L13,6.38V5h-2v1.38L9.25,7.5L7,9l-1.12,0.75L4.38,12H2v2h2.42l1.33,2.67C6.13,17.47,6.99,18,8,18h8c1.01,0,1.87-0.53,2.25-1.33L19.58,14H22v-2H19.62z M8,16c-0.55,0-1-0.45-1-1s0.45-1,1-1s1,0.45,1,1S8.55,16,8,16z M16,16c-0.55,0-1-0.45-1-1s0.45-1,1-1s1,0.45,1,1S16.55,16,16,16z"/></svg>
            </span>
            <span class="category-text"><b>A2.1.</b> Motocicleta, ciclomotor y triciclo hasta 150cc.</span>
        </div>
        <div class="category-row">
            <span class="category-icon">
                <svg viewBox="0 0 24 24"><path d="M18.92,6.01C18.72,5.42,18.16,5,17.5,5h-11c-0.66,0-1.21,0.42-1.42,1.01L3,12v8c0,0.55,0.45,1,1,1h1c0.55,0,1-0.45,1-1v-1h12 v1c0,0.55,0.45,1,1,1h1c0.55,0,1-0.45,1-1v-8L18.92,6.01z M6.5,16c-0.83,0-1.5-0.67-1.5-1.5S5.67,13,6.5,13s1.5,0.67,1.5,1.5 S7.33,16,6.5,16z M17.5,16c-0.83,0-1.5-0.67-1.5-1.5s0.67-1.5,1.5-1.5s1.5,0.67,1.5,1.5S18.33,16,17.5,16z M5,11l1.5-4.5h11L19,11H5z"/></svg>
            </span>
            <span class="category-text"><b>B1.</b> Automóviles, utilitarios, camioneta y casa rodante con motor hasta 3500kg. de peso total.</span>
        </div>
    </div>

    <div class="observations-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="escudo-argentino" alt="Escudo Argentino">
        <div class="obs-content">
            <div class="obs-row">
                <span><span class="obs-label">Grupo y Factor:</span> <b>RH+</b></span>
                <span><span class="obs-label">CUIL:</span> <b>20-38638395-4</b></span>
            </div>
            <div class="obs-row">
                <span><span class="obs-label">Observaciones / <span class="lang-en">Observations:</span></span> <b>NINGUNA</b></span>
            </div>
        </div>
    </div>

    <div class="footer-reverso">    
        <div class="lnc-text">LNC</div>
        <div class="barcode"></div>
        <div class="signature-box">
            <span class="sig-name">NICOLAS NAIDICH</span>
            <b>Responsable</b><br>
            <span class="lang-en" style="font-size: 7px;">responsible, in charge</span>
        </div>
    </div>    

</div>    

<script>    
function cambiarFondo(input){  
    const carnet = document.getElementById('carnet');  
    const reader = new FileReader();  
    reader.onload = e=>{  
        carnet.style.backgroundImage = `url('${e.target.result}')`;  
        carnet.style.backgroundSize = "cover";  
        carnet.style.backgroundPosition = "center";  
        carnet.style.backgroundRepeat = "no-repeat";  
    }  
    reader.readAsDataURL(input.files[0]);  
}  

async function generarPDF(){    
    const { jsPDF } = window.jspdf;    
    const canvas = await html2canvas(document.getElementById("carnet"), {  
        scale:4,  
        useCORS:true  
    });    
    const img = canvas.toDataURL("image/png");    
    const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:[85.6,54] });    
    pdf.addImage(img,"PNG",0,0,85.6,54);    
    pdf.save("reverso_lnc.pdf");    
}    
</script>    

</body>    
</html>
